<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Fossil Dig — POC</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%F0%9F%A6%B4%3C/text%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Gaegu:wght@400;700&display=swap');
  :root { --soil:#6b4a2f; --bone:#d8c9a3; --brk:#7a3b2b; --ink:#463218;
    --fh:'Nanum Pen Script','Gaegu',-apple-system,BlinkMacSystemFont,sans-serif; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#c79a5e; font-family:var(--fh); touch-action:none; user-select:none; -webkit-user-select:none; }
  #app { position:fixed; inset:0; }
  canvas { display:block; position:absolute; inset:0; width:100%!important; height:100%!important; }

  /* ===== HUD ===== */
  #hud-top {
    position:fixed; left:0; right:0; top:0; z-index:10;
    padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;
    pointer-events:none;
    display:flex; flex-direction:column; gap:8px;
  }
  /* 낡은 종이 스트립(발굴 노트 톤) */
  .bar-wrap { background:linear-gradient(180deg,#efe3c6,#e2d2ac); border:2px solid rgba(90,64,30,.5);
    border-radius:14px 16px 15px 13px; padding:8px 14px 11px; box-shadow:0 3px 10px rgba(40,26,12,.35); }
  .bar-label { display:flex; justify-content:space-between; align-items:flex-end; font-size:22px; font-weight:700; color:var(--ink);
    letter-spacing:.3px; margin-bottom:4px; }
  .bar-label .val { color:#8a5a1e; }
  .bar-track { height:14px; border-radius:8px; background:rgba(90,64,30,0.2); overflow:hidden;
    border:1.5px solid rgba(90,64,30,.35); box-shadow:inset 0 1px 3px rgba(90,64,30,.4); }
  .bar-fill { height:100%; width:0%; border-radius:8px; transition:width .12s linear; }
  #reveal-fill { background:linear-gradient(90deg,#c98a2e,#f0c674); box-shadow:0 0 6px rgba(230,180,90,.5); }

  /* ===== 잘못된 도구 힌트 토스트 ===== */
  #hint {
    position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom,0px) + 96px);
    transform:translateX(-50%) translateY(8px);
    z-index:20; pointer-events:none;
    background:rgba(24,17,9,0.82); color:#f3e6cf; border:1px solid rgba(240,198,116,0.28);
    border-radius:12px; padding:8px 14px; font-size:13px; font-weight:600; letter-spacing:.2px;
    white-space:nowrap; opacity:0; transition:opacity .18s, transform .18s;
    backdrop-filter:blur(4px); box-shadow:0 4px 14px rgba(0,0,0,.35);
  }
  #hint.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ===== Tool bar ===== */
  #toolbar {
    position:fixed; left:0; right:0; bottom:0; z-index:10;
    padding:10px 12px calc(env(safe-area-inset-bottom,0px) + 14px);
    display:flex; gap:10px; justify-content:center;
    pointer-events:auto;
  }
  .tool-btn {
    flex:1; max-width:120px; min-width:78px;
    background:rgba(30,22,14,0.72); border:2px solid rgba(255,255,255,0.08);
    border-radius:16px; padding:9px 6px 8px; color:#e8d9bc; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    transition:transform .08s, border-color .12s, background .12s;
  }
  .tool-btn:active { transform:scale(0.94); }
  .tool-btn.active { border-color:#f0c674; background:rgba(90,64,30,0.92); box-shadow:0 0 14px rgba(240,198,116,0.35); }
  .tool-ico { font-size:26px; line-height:1; }
  .tool-name { font-size:12px; font-weight:700; letter-spacing:.2px; }

  /* ===== Overlays ===== */
  #overlay {
    position:fixed; inset:0; z-index:30; display:none;
    align-items:center; justify-content:center; flex-direction:column;
    /* 반투명 — 상승한 발굴물(트로피)이 뒤에서 회전하며 보이도록(2026-07-01). 텍스트 가독은
       하단 그라데이션 + 텍스트 그림자로 확보. */
    background:linear-gradient(180deg, rgba(10,7,4,0.15) 0%, rgba(10,7,4,0.35) 45%, rgba(10,7,4,0.75) 100%);
    text-align:center; padding:24px;
  }
  #overlay.show { display:flex; animation:fade .4s ease; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  #ov-title { font-size:58px; font-weight:700; margin-bottom:6px; letter-spacing:1px; text-shadow:0 3px 14px rgba(0,0,0,.6); }
  #ov-sub { font-size:22px; color:#fff2d8; margin-bottom:24px; text-shadow:0 2px 8px rgba(0,0,0,.7); }
  #ov-retry {
    pointer-events:auto; background:url(../assets/ui/btn_paper.webp) center/100% 100% no-repeat; color:var(--ink); border:none;
    padding:14px 40px 17px; font-size:23px; font-weight:700; cursor:pointer; font-family:var(--fh);
  }
  #ov-retry:active { transform:scale(0.95); }
  .win #ov-title { color:#ffe6a0; } .lose #ov-title { color:#ff8a6a; }

  /* subtle title */
  #brand { position:fixed; top:calc(env(safe-area-inset-top,0px) + 4px); right:14px; z-index:9;
           font-size:11px; color:rgba(243,230,207,.35); font-weight:600; letter-spacing:1px; pointer-events:none; }
</style>
</head>
<body>
<div id="app"></div>

<div id="hud-top">
  <div class="bar-wrap">
    <div class="bar-label"><span>발굴률</span><span class="val" id="reveal-val">0%</span></div>
    <div class="bar-track"><div class="bar-fill" id="reveal-fill"></div></div>
  </div>
</div>
<div id="brand">FOSSIL DIG</div>

<div id="hint"></div>

<div id="toolbar"></div>

<div id="overlay">
  <div id="ov-title">CLEAR!</div>
  <div id="ov-sub">Tap to Retry</div>
  <button id="ov-retry">다시하기</button>
</div>

<!-- voxel-slingshot 방식: 상대경로 벤더 로드 -->
<script src="../vendor/three.r128.min.js"></script>
<script src="../vendor/models/GLTFLoader.js"></script>
<script>
(function () {
  "use strict";

  // ============================================================
  // 메타 셸(지도 앱) 연동 — ?obj=&rarity=&region=&name= 수용 (비파괴)
  //   파라미터가 없으면(단독 실행) 기존 동작과 100% 동일. 라벨/도감 기록용.
  //   clear 시 부모(지도 셸)로 postMessage + 동일오리진 localStorage 이중기록(L22).
  // ============================================================
  const QP = new URLSearchParams(location.search);
  const ENCOUNTER = {
    obj: QP.get("obj") || null,
    rarity: QP.get("rarity") || null,
    region: QP.get("region") || null,
    name: QP.get("name") ? decodeURIComponent(QP.get("name")) : null,
    spot: QP.get("spot") || null,        // 소모 처리용 스폰 지점 id
    active: QP.has("obj") || QP.has("meta")
  };
  const CHEAT = QP.has("cheat") && QP.get("cheat") !== "0";   // 치트: 즉시발굴 버튼 노출
  // 다중 오브젝트: ?objs=JSON([{obj,name,rarity},...]) (사용자 2026-07-02: 한 발굴에 여러 개). 없으면 단일 폴백.
  ENCOUNTER.objs = (function () {
    try { const raw = QP.get("objs"); if (raw) { const a = JSON.parse(decodeURIComponent(raw)); if (Array.isArray(a) && a.length) return a; } } catch (e) {}
    if (ENCOUNTER.obj) return [{ obj: ENCOUNTER.obj, name: ENCOUNTER.name, rarity: ENCOUNTER.rarity }];
    return [{ obj: "dino_skull", name: null, rarity: "common" }];
  })();
  let _completeSent = false;
  function notifyComplete() {
    if (_completeSent) return;
    _completeSent = true;
    const list = (ENCOUNTER.objs && ENCOUNTER.objs.length) ? ENCOUNTER.objs : null;
    const first = list ? list[0] : null;
    const payload = {
      type: "dig-complete",
      obj: (first && first.obj) || ENCOUNTER.obj || "dino_skull",
      rarity: (first && first.rarity) || ENCOUNTER.rarity || "common",
      region: ENCOUNTER.region || "default",
      name: (first && first.name) || ENCOUNTER.name || null,
      objs: list,                                  // 다중 오브젝트 전체(맵이 각각 도감 기록)
      spot: ENCOUNTER.spot || null,
      ts: Date.now()
    };
    // ① 부모로 postMessage (iframe 오버레이 / 별창 모두)
    try { if (window.parent && window.parent !== window) window.parent.postMessage(payload, "*"); } catch (e) {}
    try { if (window.opener) window.opener.postMessage(payload, "*"); } catch (e) {}
    // ② 동일오리진 localStorage 이중기록 폴백 (타이밍/단독 유실 방지 — L22)
    try {
      const raw = localStorage.getItem("fossildig_pending");
      const arr = raw ? JSON.parse(raw) : [];
      arr.push(payload);
      localStorage.setItem("fossildig_pending", JSON.stringify(arr));
    } catch (e) {}
  }

  // ============================================================
  // STAGE DATA (POC 인라인 — 나중에 stages/*.json fetch로 교체)
  // ============================================================
  //  ── 단일 도구(삽 전용) 모델 (2026-07-01 재설계) ──
  //  사용자 요청: 삽·끌·붓 구분 제거. 삽 하나로 오브젝트 위 흙을 objTop까지 전부 걷어낸다.
  //  도구 UI도 표시하지 않는다(tools 1종이면 buildToolbar가 툴바를 숨김).
  //  오브젝트는 절대 손상 안 됨(파고들기 자체가 불가 — soilTop이 objTop에서 클램프).
  //  (구 레이어-재료 3층 게이트는 canDig에서 layer:"all"이면 무조건 통과로 우회.)
  const STAGE = {
    level: 1,
    grid: { cols: 72, rows: 96 },
    // type은 지도 셸의 ?obj= 를 반영(실물 3D 모델 선택). placement.scale은 bed footprint 모델에선 미사용.
    object: { type: (ENCOUNTER.obj || "dino_skull"), placement: { x: 0.5, y: 0.5, scale: 0.4 }, tilt: 0.26 },
    soil: {
      startDepth: 1.35,
      // 층 경계는 셰이더 톤(겉흙/모래) 구분에만 남겨둠(도구 게이트는 미사용).
      fineTop: 0.30,
      midTop: 0.50
    },
    tools: ["shovel"],
    clear: { revealFrac: 1.0 }
  };

  // ── 발굴 대상 3D 모델 (무료 CC0/CC-BY, assets/models/) ──
  //  objKey → glb 파일. 흙 아래 묻어두고 파내며 드러내고, 100%면 밖으로 상승(rise).
  const MODEL_BASE = "../assets/models/";
  const MODEL_CFG = {
    junk_bottle:{file:"junk_bottle.glb"}, junk_can:{file:"junk_can.glb"},
    coin:{file:"coin.glb"}, gem:{file:"gem.glb"},
    shell:{file:"shell.glb"}, vase:{file:"vase.glb"},
    crown:{file:"crown.glb"}, skull:{file:"skull.glb"},
    sword:{file:"sword.glb"},
    // dino: 원본(양자화) 파일이 렌더는 정상이나 스키닝 bind-pose bbox가 부정확 → dequantize본에서
    //  boneTransform으로 측정한 '실제 포즈 bbox'를 하드코딩(posedBox)해 정확히 fit·정렬. animate로 idle.
    dino:{file:"dino.glb", animate:false, posedBox:{ sz:[7.96,14.68,30.88], c:[0,7.25,-1.0], minY:-0.09 }, layY:0.2},
    // velociraptor: 스키닝+양자화 + 리깅 특이로 posed-box 측정 불가 → 명시 fitScale·pos(육안 튜닝).
    velociraptor:{file:"velociraptor.glb", animate:false, fitScale:0.55, pos:[0,0,0], layY:0.2, layCap:5.0},
    chest:{file:"chest.glb"}, goldbag:{file:"goldbag.glb"}
  };
  // 구 regions.json obj키 → 신 모델 키 (loot 재구성 전 호환용 폴백)
  const OBJ_ALIAS = { dino_skull:"skull", bone:"skull", relic:"vase", ammonite:"shell",
    trilobite:"shell", egg:"gem", tooth:"skull", claw:"sword", bird:"skull",
    fight:"dino", footprint:"coin", plate:"coin" };
  function resolveObjKey(t) {
    if (MODEL_CFG[t]) return t;
    if (OBJ_ALIAS[t]) return OBJ_ALIAS[t];   // 구 키 매핑
    return t || "skull";   // 그 외는 키=파일명 가정(대량 확장: assets/models/<key>.glb 동적 로드)
  }

  // 도구 기본값 — 레이어-재료: 각 도구는 담당 층만 제거(layer 지정), 층 하단서 멈춤.
  //  삽    : BULK 담당(대반경·큰깊이). soilAbove가 midTop 이하로 내려가면 멈춤(끌 차례).
  //  끌    : MID 담당(중반경). soilAbove가 fineTop 이하로 내려가면 멈춤(붓 차례).
  //  붓    : FINE 담당(마무리). objTop(0)까지 걷어냄. 두꺼운 층엔 no-op.
  //  layer=자기가 파는 층 id. 오브젝트 셀에서만 게이트 적용(비-오브젝트 흙은 아무 도구나 바닥까지).
  const TOOL_DEFS = {
    // 삽 전용: layer:"all" → canDig 무조건 통과 + LAYER_FLOOR.all=0 → objTop까지 발굴.
    shovel: { name: "삽",  ico: "🪏", radius: 6, depthPerStroke: 0.20,  layer: "all",  haptic: 24, sfx: "shovel" },
    // (구 도구 — 미사용, 향후 스테이지 재활용 대비 정의만 보존)
    chisel: { name: "끌",  ico: "🔨", radius: 3, depthPerStroke: 0.075, layer: "mid",  haptic: 16, sfx: "chisel" },
    brush:  { name: "붓",  ico: "🖌️", radius: 5, depthPerStroke: 0.05,  layer: "fine", haptic: 8,  sfx: "brush" }
  };

  // 층 경계 (절대값 = 데이터 × startDepth). fullSync/게이트/틴트가 공용으로 참조.
  const FINE_TOP = STAGE.soil.fineTop * STAGE.soil.startDepth;   // ≈0.189
  const MID_TOP  = STAGE.soil.midTop  * STAGE.soil.startDepth;   // ≈0.608
  // 해당 도구가 어느 층까지 파는지(층 하단 경계). 도구가 이 값 아래로는 못 내려감.
  const LAYER_FLOOR = { all: 0, bulk: MID_TOP, mid: FINE_TOP, fine: 0 };
  // GRACE(hysteresis): 도구가 자기 밴드 + 위 밴드의 GRACE 슬라이스까지 처리 → 경계 근처 작은 잔여
  //  때문에 끌↔붓을 왔다갔다 하는 불편 제거(사용자 2026-07-01). 붓은 (FINE_TOP+GRACE) 이하를 objTop까지
  //  쭉 마무리 → 한 번 붓 잡으면 그 구역 끝. 여전히 두꺼운 겉흙(초기 soilAbove≥~0.82)엔 안 먹힘.
  const LAYER_GRACE = STAGE.soil.startDepth * 0.10;   // ≈0.135

  // 잘못된 도구 안내 문구 (soilAbove 밴드 → 올바른 도구)
  const LAYER_HINT = {
    bulk: "겉흙이 두꺼워요 — 삽으로 파세요",
    mid:  "단단한 흙이에요 — 끌로 떼어내세요",
    fine: "고운 모래층 — 붓으로 쓸어내세요"
  };
  //  BAND_EPS: 앞 도구가 자기 floor(경계)에 정확히 클램프해 멈추면 soilAbove가 경계값에
  //  딱 앉는다. 이때 부동소수 오차로 경계 바로 위(=앞 도구 밴드)에 남아 다음 도구가 못 이어받는
  //  교착을 막기 위해, 경계에서 EPS 이내면 아래(=다음 도구) 밴드로 넘긴다. (경계 = 다음 도구 담당)
  const BAND_EPS = 1e-3;
  function layerAt(soilAbove) {
    if (soilAbove > MID_TOP + BAND_EPS) return "bulk";
    if (soilAbove > FINE_TOP + BAND_EPS) return "mid";
    return "fine";
  }
  // 이 도구가 이 깊이(soilAbove)를 팔 수 있는가 — 자기 밴드 + 위 밴드로 GRACE만큼 여유(hysteresis).
  //  삽=위쪽(경계 없음), 끌=FINE_TOP 위 ~ MID_TOP+GRACE, 붓=FINE_TOP+GRACE 이하. 겹침(overlap)이
  //  전환 빈도를 낮춘다(경계 근처는 두 도구 다 가능). floor(LAYER_FLOOR)에서 멈추는 건 그대로.
  function canDig(layer, soilAbove) {
    if (layer === "all") return true;   // 삽 전용: 어떤 깊이든 objTop까지 발굴
    if (layer === "bulk") return soilAbove > MID_TOP + BAND_EPS;
    if (layer === "mid")  return soilAbove > FINE_TOP + BAND_EPS && soilAbove <= MID_TOP + LAYER_GRACE;
    return soilAbove <= FINE_TOP + LAYER_GRACE;   // fine(붓)
  }

  // 튜닝 상수
  //  reveal 판정: soilTop <= objTop + TOL 이면 "노출됨" (손상 개념 없음 → 아래쪽 여유 무제한).
  const TOL = 0.02;          // reveal 허용오차 (붓이 objTop까지 클램프하므로 좁아도 됨)
  const OBJ_MIN = 0.05;      // objTop이 이 값보다 크면 "오브젝트 열"로 간주

  // ============================================================
  // WORLD / GRID
  // ============================================================
  const COLS = STAGE.grid.cols, ROWS = STAGE.grid.rows;
  const N = COLS * ROWS;
  const WORLD_W = 20;                          // 월드 가로
  const WORLD_H = WORLD_W * (ROWS / COLS);     // 세로 (비율 유지)
  const START_DEPTH = STAGE.soil.startDepth;   // 초기 흙 높이 (정규화 1.0)
  const HEIGHT_SCALE = 4.0;                     // 정규화 높이 -> 월드 Y 배율

  // 열 인덱스: i = r*COLS + c
  let soilTop = new Float32Array(N);   // 현재 흙 표면 (정규화)
  let objTop  = new Float32Array(N);   // 묻힌 오브젝트 표면 (정규화, 고정)
  let isObj   = new Uint8Array(N);     // 오브젝트 열 여부
  let totalObjCols = 0;

  // ============================================================
  // objTop 절차적 릴리프 — 공룡 두개골 실루엣 (POC)
  //   나중에 depthMap PNG 로드로 교체 (buildObjTop 교체만)
  // ============================================================
  function gauss(dx, dy, sx, sy) {
    return Math.exp(-(dx * dx) / (2 * sx * sx) - (dy * dy) / (2 * sy * sy));
  }
  // smoothstep(0,1) clamp
  function smooth01(x) {
    if (x <= 0) return 0;
    if (x >= 1) return 1;
    return x * x * (3 - 2 * x);
  }

  // ── 발굴 footprint(원형 bed) — 실물 3D 모델 방식(2026-07-01) ──
  //  objTop은 더 이상 상세 릴리프가 아니라, 발굴 대상이 놓인 '낮은 흙 bed'(원형 footprint)다.
  //  reveal/클리어는 이 footprint 위 흙 제거율로 계산하고, 실제 형태는 loadObjModel()이 씬에
  //  놓는 glb 모델이 담당한다(흙 아래 묻힘 → 파낼수록 깊이버퍼로 드러남 → 100%면 rise).
  const OBJ_FOOTPRINT_R = 5.6;                 // bed 원반 반경(월드) — 카메라 halfW 6.5 안
  const OBJ_LAY_TILT = 0.14;                   // 눕힌 뒤 살짝 기울임(발굴된 듯 자연스럽게)
  const OBJ_BED_PEAK = 0.14;                   // bed 높이(정규화, ×START_DEPTH). 낮게=모델이 주인공
  const OBJ_BASE_Y = OBJ_BED_PEAK * START_DEPTH * HEIGHT_SCALE;   // 모델 밑면이 앉는 bed 표면(월드 Y)
  // 발굴 대상 매설 위치(월드 XZ). 매 발굴마다 제각각 → 찾는 재미(사용자 2026-07-01).
  //  footprint(R)가 필드 안에 들어오도록 마진 두고 랜덤. buildObjTop이 갱신, 모델/리셋이 참조.
  let objCX = 0, objCZ = 0;
  //  발굴률 = 이 풋프린트(타원) 위 흙 제거율. 실제 모델 크기에 맞춰(작은 물건=작은 영역) → 물건만
  //  다 드러내면 100%(사용자 2026-07-02: "전체 땅 기준으로 측정돼 헷갈림" 수정). 모델 로드 후 실측.
  let objRX = OBJ_FOOTPRINT_R, objRZ = OBJ_FOOTPRINT_R;   // 현재 풋프린트 반경(월드)
  let objModelRX = 0, objModelRZ = 0;                     // 모델 실측 반경(로드 후 세팅, reset도 참조)
  function randomizeObjPos() {
    const rr = Math.max(objModelRX || OBJ_FOOTPRINT_R, objModelRZ || OBJ_FOOTPRINT_R);
    const mx = Math.max(0, WORLD_W / 2 - rr - 0.6);
    const mz = Math.max(0, WORLD_H / 2 - rr - 0.6);
    objCX = (Math.random() * 2 - 1) * mx;
    objCZ = (Math.random() * 2 - 1) * mz;
  }
  // 타원 풋프린트(objCX,objCZ 중심 · objRX,objRZ 반경) → objTop/isObj/totalObjCols
  function computeFootprint() {
    objTop.fill(0);
    totalObjCols = 0;
    const peak = OBJ_BED_PEAK * START_DEPTH;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const i = r * COLS + c;
        const x = (c / (COLS - 1) - 0.5) * WORLD_W;
        const z = (r / (ROWS - 1) - 0.5) * WORLD_H;
        const nx = (x - objCX) / objRX, nz = (z - objCZ) / objRZ;
        const dd = Math.sqrt(nx * nx + nz * nz);     // 0 중심 .. 1 가장자리
        const m = smooth01((1 - dd) / 0.30);         // 소프트 가장자리
        const top = peak * m;
        objTop[i] = top;
        isObj[i] = top > OBJ_MIN ? 1 : 0;
        if (isObj[i]) totalObjCols++;
      }
    }
  }
  function buildObjTop() {
    randomizeObjPos();
    objRX = objModelRX > 0 ? objModelRX : OBJ_FOOTPRINT_R;   // 모델 실측이 있으면 물건 크기 기준
    objRZ = objModelRZ > 0 ? objModelRZ : OBJ_FOOTPRINT_R;
    computeFootprint();
  }
  // 모델 로드 후: 실제 모델 XZ 반경으로 풋프린트 재계산(발굴률이 물건 크기에 맞게).
  function applyModelFootprint(lay) {
    let hx = 0, hz = 0;
    try {
      const b = new THREE.Box3().setFromObject(lay);
      if (isFinite(b.min.x) && isFinite(b.max.x)) {
        hx = (b.max.x - b.min.x) / 2; hz = (b.max.z - b.min.z) / 2;
      }
    } catch (e) {}
    const clamp = (v) => Math.max(1.7, Math.min(OBJ_FOOTPRINT_R, v || OBJ_FOOTPRINT_R));
    objModelRX = clamp(hx * 1.25);   // 약간 여유(주변도 조금 파게)
    objModelRZ = clamp(hz * 1.25);
    objRX = objModelRX; objRZ = objModelRZ;
    computeFootprint();
    fullSync();
    updateHUD();
  }

  // ── 발굴 대상 실물 3D 모델: 흙 아래 배치 → 파내며 드러남 → 100%면 상승(rise) ──
  let objGroup = null, objMixer = null, objModelReady = false;
  let objRise = null;      // {t,dur,fromY,toY}  상승 트윈
  let objSpin = false;     // 상승 후 천천히 회전(전시)
  const OBJ_RISE_Y = HEIGHT_SCALE * START_DEPTH + 1.2;   // 지면 위로 솟는 목표 높이(월드 Y)

  // 모델 실제 bbox: 스키닝 메시는 bind-pose가 렌더와 달라(예: T-Rex) boneTransform으로 실제
  //  포즈 정점을 샘플링, 정적 메시는 setFromObject(양자화 matrixWorld 정확). 둘을 union.
  function computeModelBox(model) {
    model.updateWorldMatrix(true, true);
    const box = new THREE.Box3(), v = new THREE.Vector3(); let any = false;
    model.traverse(function (o) {
      const bt = o.isSkinnedMesh && (o.applyBoneTransform || o.boneTransform);
      if (bt && o.skeleton && o.geometry && o.geometry.attributes.position) {
        o.skeleton.update();
        const pos = o.geometry.attributes.position;
        const step = Math.max(1, Math.floor(pos.count / 1200));
        for (let i = 0; i < pos.count; i += step) {
          v.fromBufferAttribute(pos, i);
          if (o.applyBoneTransform) o.applyBoneTransform(i, v); else o.boneTransform(i, v);
          v.applyMatrix4(o.matrixWorld); box.expandByPoint(v); any = true;
        }
      } else if (o.isMesh && o.geometry) {
        box.union(new THREE.Box3().setFromObject(o)); any = true;
      }
    });
    if (!any) box.setFromObject(model);
    return box;
  }

  // 한 개 모델을 로드해 lay 그룹으로 감싸(눕히기·매립캡·접지) objGroup의 (ox,oz) 위치에 배치.
  //  sizeScale: 다중 오브젝트일 때 각 물건을 작게(클러스터로 함께 묻힘).
  function loadOneModel(spec, ox, oz, sizeScale, onDone) {
    const key = resolveObjKey(spec.obj);
    const cfg = MODEL_CFG[key] || { file: key + ".glb" };
    new THREE.GLTFLoader().load(MODEL_BASE + cfg.file, function (gltf) {
      try {
        const model = gltf.scene;
        if (cfg.rotY) model.rotation.y = cfg.rotY;
        let box;
        if (cfg.posedBox) {
          const pb = cfg.posedBox;
          box = new THREE.Box3(
            new THREE.Vector3(pb.c[0] - pb.sz[0]/2, pb.minY, pb.c[2] - pb.sz[2]/2),
            new THREE.Vector3(pb.c[0] + pb.sz[0]/2, pb.minY + pb.sz[1], pb.c[2] + pb.sz[2]/2));
        } else {
          box = computeModelBox(model);
        }
        const size = new THREE.Vector3(); box.getSize(size);
        const center = new THREE.Vector3(); box.getCenter(center);
        const horiz = Math.max(size.x, size.z) || 1;
        const targetHoriz = OBJ_FOOTPRINT_R * 1.15 * sizeScale;
        // 오브젝트가 흙 컬럼의 아래 절반만 차지 → 위에 흙이 두껍게(훨씬 깊게 매립, 사용자 2026-07-02).
        const targetHeight = (HEIGHT_SCALE * START_DEPTH - OBJ_BASE_Y) * 0.5;
        const s = cfg.fitScale != null ? cfg.fitScale * sizeScale
          : Math.min(targetHoriz / horiz, targetHeight / (size.y || 1));
        model.scale.setScalar(s);
        if (cfg.pos) model.position.set(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
        else model.position.set(-center.x * s, -box.min.y * s, -center.z * s);
        model.traverse(function (o) {
          if (o.isMesh) {
            o.castShadow = true; o.receiveShadow = false;
            const mats = Array.isArray(o.material) ? o.material : (o.material ? [o.material] : []);
            for (const mt of mats) {
              mt.side = THREE.FrontSide;
              // 낡은/오래된 느낌(사용자 2026-07-02: 오브젝트 너무 깔끔 → 채도↓·살짝 어둡게·거칠게).
              const c = mt.color;
              if (c) { const l = 0.3*c.r + 0.59*c.g + 0.11*c.b, k = 0.34;
                c.setRGB((c.r*(1-k)+l*k)*0.9, (c.g*(1-k)+l*k)*0.9, (c.b*(1-k)+l*k)*0.9); }
              if ("roughness" in mt) mt.roughness = Math.min(1, (mt.roughness != null ? mt.roughness : 0.6) + 0.3);
              if ("metalness" in mt) mt.metalness = (mt.metalness != null ? mt.metalness : 0) * 0.4;
              mt.needsUpdate = true;
            }
            o.frustumCulled = false;
          }
        });
        // 랜덤 매장 자세(사용자 2026-07-02: 항상 90° 말고 뒤집힘/대각선/옆으로 — 현실 네러티브) + 매립 보장.
        //  정적 모델=임의 회전 후 setFromObject로 높이 캡→어떤 자세든 흙에 묻힘. 스키닝=특이라 약한 랜덤 틸트.
        const ceil = HEIGHT_SCALE * START_DEPTH - OBJ_BASE_Y - 0.55;
        const skinned = !!(cfg.posedBox || cfg.fitScale);
        const rnd = (a) => (Math.random() * 2 - 1) * a;
        const lay = new THREE.Group();
        if (skinned) {
          lay.rotation.set(-Math.PI / 2 + rnd(0.3), Math.random() * Math.PI * 2, rnd(0.4));
        } else {
          // 다양한 기본 자세(눕힘/뒤집힘/옆/대각) 중 하나 + 큰 지터
          const poses = [[Math.PI/2,0],[-Math.PI/2,0],[Math.PI,0],[Math.PI/2,Math.PI/2],[0,0]];
          const p = poses[(Math.random() * poses.length) | 0];
          lay.rotation.set(p[0] + rnd(0.55), Math.random() * Math.PI * 2, p[1] + rnd(0.55));
        }
        lay.add(model);
        lay.updateWorldMatrix(true, true);
        let groundY;
        if (skinned) {
          let laidH = cfg.layCap != null ? cfg.layCap * sizeScale : 0;
          if (cfg.posedBox) laidH = Math.max(cfg.posedBox.sz[0], cfg.posedBox.sz[1], cfg.posedBox.sz[2]) * s;  // 보수적(어떤 회전이든 안 삐져나옴)
          if (laidH > ceil) lay.scale.setScalar(ceil / laidH);
          groundY = (cfg.layY != null ? cfg.layY : 0.3);
        } else {
          let lb = new THREE.Box3().setFromObject(lay);
          const laidH = (lb.max.y - lb.min.y) || 1;
          if (laidH > ceil) { lay.scale.setScalar(ceil / laidH); lb = new THREE.Box3().setFromObject(lay); }
          groundY = isFinite(lb.min.y) ? -lb.min.y : 0;
        }
        lay.position.set(ox, groundY, oz);   // 클러스터 오프셋 + 바닥 접지
        if (objGroup) objGroup.add(lay);
        if (cfg.animate && gltf.animations && gltf.animations.length && !objMixer) {
          objMixer = new THREE.AnimationMixer(model);
          objMixer.clipAction(gltf.animations[0]).play();
        }
      } catch (e) { try { console.warn("obj model place fail", key, e); } catch(_){} }
      onDone();
    }, undefined, function (err) { try { console.warn("obj model load fail", key, err); } catch(e){} onDone(); });
  }

  // 발굴 대상 = ENCOUNTER.objs (1~N개). 모두 한 objGroup 아래 클러스터로 묻고, 로드 완료 후 union 풋프린트.
  function loadObjModel() {
    if (typeof THREE.GLTFLoader === "undefined") return;
    const specs = ENCOUNTER.objs && ENCOUNTER.objs.length ? ENCOUNTER.objs : [{ obj: STAGE.object.type }];
    const N = specs.length;
    window.__objKey = resolveObjKey(specs[0].obj);
    window.__objCount = N;
    const grp = new THREE.Group();
    grp.position.set(objCX, OBJ_BASE_Y, objCZ);   // 매설 위치(제각각)
    scene.add(grp);
    objGroup = grp;
    const sizeScale = N > 1 ? 0.6 : 1.0;                       // 여럿이면 각각 작게(함께 들어가게)
    const clusterR = N > 1 ? OBJ_FOOTPRINT_R * 0.34 : 0;       // 클러스터 반경
    let loaded = 0;
    specs.forEach(function (spec, i) {
      const ang = (i / N) * Math.PI * 2 + 0.6;
      const ox = Math.cos(ang) * clusterR, oz = Math.sin(ang) * clusterR;
      loadOneModel(spec, ox, oz, sizeScale, function () {
        loaded++;
        if (loaded >= N) {
          applyModelFootprint(grp);   // 클러스터 전체(union)로 발굴 영역 → 모두 드러내야 100%
          objModelReady = true;
          window.__objModelReady = true;
        }
      });
    });
  }

  // 100% 클리어 시: 모델을 땅 밖으로 끌어올린다(easeOut) + 이후 천천히 회전.
  function startObjRise() {
    if (!objGroup) return;
    objRise = { t: 0, dur: 0.9, fromY: objGroup.position.y, toY: OBJ_RISE_Y };
    objSpin = true;
  }
  function updateObjAnim(dt) {
    if (objMixer) objMixer.update(dt);
    if (objRise && objGroup) {
      objRise.t += dt;
      const k = Math.min(1, objRise.t / objRise.dur);
      const e = 1 - Math.pow(1 - k, 3);           // easeOutCubic
      objGroup.position.y = objRise.fromY + (objRise.toY - objRise.fromY) * e;
      if (k >= 1) objRise = null;
    }
    if (objSpin && objGroup) objGroup.rotation.y += dt * 0.7;
  }

  // ============================================================
  // THREE 씬
  // ============================================================
  let renderer, scene, camera, terrain, geo, posAttr;
  let raycaster, ndc;
  let terrainMat, soilTex, boneTex, revealAttr;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const TEX_REPEAT = 7.0;   // 월드 UV 반복 횟수 (지형 폭 대비)

  // 실측 텍스처를 씀 → 정점컬러 대신 톤 대비는 셰이더가 담당.
  // (흙=진갈색 어둡게 / 뼈=크림 밝게 극대비)

  function makeTerrainTexture(url, sRGB) {
    const t = new THREE.TextureLoader().load(url);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.repeat.set(1, 1);           // 반복은 셰이더에서 UV*repeat로 처리
    t.anisotropy = renderer ? renderer.capabilities.getMaxAnisotropy() : 4;
    t.magFilter = THREE.LinearFilter;
    t.minFilter = THREE.LinearMipmapLinearFilter;
    t.generateMipmaps = true;
    if (sRGB && THREE.sRGBEncoding) t.encoding = THREE.sRGBEncoding;
    t.needsUpdate = true;
    return t;
  }

  function initThree() {
    const app = document.getElementById("app");
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
    renderer.setPixelRatio(DPR);
    renderer.setClearColor(0xc79a5e, 1);   // 캐주얼: 따뜻한 샌드 배경(구 near-black에서 전환)
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    // 톤매핑 완화 + 노출 낮춤: 밝은 뼈는 살리되 흙은 확실히 어둡게 (파리한 톤 제거)
    renderer.toneMapping = THREE.NoToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.outputEncoding = THREE.sRGBEncoding;
    app.appendChild(renderer.domElement);

    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xc7a970, 105, 210);   // 캐주얼: 밝은 샌드 포그, 멀리 밀어 옅게

    camera = new THREE.PerspectiveCamera(42, 1, 0.1, 500);

    // 텍스처 로드 (상대경로 — 단일 HTML/앱 양쪽 호환)
    soilTex = makeTerrainTexture("../assets/textures/soil.webp", true);
    boneTex = makeTerrainTexture("../assets/objects/bone.webp", true);

    // --- 지형: PlaneGeometry를 XZ로 눕힘 ---
    geo = new THREE.PlaneGeometry(WORLD_W, WORLD_H, COLS - 1, ROWS - 1);
    geo.rotateX(-Math.PI / 2);   // XZ 평면
    posAttr = geo.attributes.position;

    // 발굴상태를 per-vertex color 어트리뷰트로 전달 (r=reveal, g=layer 톤).
    //  (color는 가장 널리 지원되는 정점 채널 — 원본 코드에서 정상 동작 확인.)
    const nVerts = posAttr.count;
    revealAttr = new THREE.BufferAttribute(new Float32Array(nVerts * 3), 3);
    geo.setAttribute("color", revealAttr);

    terrainMat = makeTerrainMaterial();
    terrain = new THREE.Mesh(geo, terrainMat);
    terrain.receiveShadow = true;
    terrain.castShadow = false;
    scene.add(terrain);

    // 조명 (벽/파티클용 표준 라이트 — 지형은 셰이더가 자체 라이팅)
    const hemi = new THREE.HemisphereLight(0xfff4e0, 0x8a6a42, 0.92);   // 캐주얼: 밝은 앰비언트 + 따뜻한 바닥 바운스
    scene.add(hemi);
    const dir = new THREE.DirectionalLight(0xfff2d6, 1.05);
    dir.position.copy(LIGHT_POS);
    dir.castShadow = true;
    dir.shadow.mapSize.set(1024, 1024);
    dir.shadow.camera.near = 1; dir.shadow.camera.far = 90;
    dir.shadow.camera.left = -WORLD_W; dir.shadow.camera.right = WORLD_W;
    dir.shadow.camera.top = WORLD_H; dir.shadow.camera.bottom = -WORLD_H;
    dir.shadow.bias = -0.0015;
    scene.add(dir);

    // 피트 벽 (발굴장 느낌) — 얇은 박스 테두리
    addPitFrame();

    // 바닥 그림자 캐처(옵션) 생략 — 지형이 곧 표면

    raycaster = new THREE.Raycaster();
    ndc = new THREE.Vector2();

    initParticles();
    onResize();
    window.addEventListener("resize", onResize);
  }

  // 공용 광원 방향 (지형 셰이더 + 씬 라이트가 같은 방향)
  const LIGHT_POS = new THREE.Vector3(-13, 26, 10);
  const _lightDir = LIGHT_POS.clone().normalize();

  // ============================================================
  // 지형 커스텀 셰이더: soil↔bone 텍스처 월드UV 타일링 + reveal mix
  //   흙=진갈색 어둡게, 뼈=크림 밝게 극대비. 노멀은 정점노멀로 라이팅.
  // ============================================================
  function makeTerrainMaterial() {
    return new THREE.ShaderMaterial({
      uniforms: {
        uSoil: { value: soilTex },
        uBone: { value: boneTex },
        uRepeat: { value: TEX_REPEAT },
        uAspect: { value: WORLD_H / WORLD_W },
        uLightDir: { value: _lightDir },
        uHeightScale: { value: HEIGHT_SCALE },
        uStartDepth: { value: START_DEPTH },
        fogColor: { value: new THREE.Color(0xc7a970) },
        fogNear: { value: 105.0 },
        fogFar: { value: 210.0 }
      },
      vertexColors: true,
      fog: false,
      lights: false,
      vertexShader: `
        varying float vReveal;
        varying float vLayer;
        varying float vHeight;
        varying vec2 vWorldUV;
        varying vec3 vNormal;
        varying float vFogDepth;
        uniform float uRepeat;
        uniform float uAspect;
        uniform float uHeightScale;
        void main() {
          // color.r=reveal(0..1), color.g=layer(0=bulk .. 0.5=mid .. 1=fine) — 표면 층 톤 구분용.
          vReveal = color.r;
          vLayer = color.g;
          vNormal = normalize(normalMatrix * normal);
          vWorldUV = vec2(position.x, position.z);
          vHeight = position.y / uHeightScale;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vFogDepth = -mv.z;
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        precision highp float;
        uniform sampler2D uSoil;
        uniform sampler2D uBone;
        uniform float uRepeat;
        uniform float uAspect;
        uniform vec3 uLightDir;
        uniform float uStartDepth;
        uniform vec3 fogColor;
        uniform float fogNear;
        uniform float fogFar;
        varying float vReveal;
        varying float vLayer;
        varying float vHeight;
        varying vec2 vWorldUV;
        varying vec3 vNormal;
        varying float vFogDepth;

        void main() {
          // 월드폭 20 기준 → 0..1로 정규화 후 repeat 타일링 (세로는 aspect 보정해 정사각 타일)
          vec2 uv = vec2(vWorldUV.x / 20.0 + 0.5, vWorldUV.y / (20.0 * uAspect) + 0.5);
          vec2 tuv = uv * vec2(uRepeat, uRepeat * uAspect);

          vec3 soil = texture2D(uSoil, tuv).rgb;
          vec3 bone = texture2D(uBone, tuv * 0.72).rgb;

          // --- 톤: 캐주얼(밝고 따뜻한 클레이/샌드). (구 사실적 어두운 진갈색에서 전환 2026-07-02) ---
          soil = pow(soil, vec3(0.92)) * 1.16;      // 밝게(감마↓+게인↑)
          soil *= vec3(1.08, 1.0, 0.82);            // 따뜻한 황토/클레이 틴트
          // 뼈: 텍스처를 크림/아이보리로 눌러 화이트아웃 방지 (디테일 보존이 핵심)
          //   원본이 매우 밝은 크림(~0.9)이라 강하게 감마+게인다운해야 미드톤 뼈가 됨.
          bone = pow(bone, vec3(1.55)) * 0.86;
          // 뼈에 살짝 따뜻한 아이보리 톤 (푸른기 제거)
          bone *= vec3(1.02, 0.98, 0.90);

          // 발굴 위치 힌트 제거(사용자 2026-07-02: 흙색으로 위치 구분되면 찾는 재미↓) — terrain 순수 흙.

          float rev = clamp(vReveal, 0.0, 1.0);
          // 흙→뼈 전이는 살짝 샤프하게 (걷히는 경계가 또렷)
          float mixT = smoothstep(0.15, 0.82, rev);
          vec3 albedo = mix(soil, bone, mixT);

          // 파낸 흙 벽(깊이) 그늘: reveal 낮고 파인 곳일수록 어둡게 (깊이 판 느낌)
          float pitShade = mix(1.0, 0.78, (1.0 - rev) * clamp((uStartDepth - vHeight) / uStartDepth, 0.0, 1.0));
          albedo *= pitShade;

          // --- 라이팅: 정점 노멀 diffuse + 앰비언트 + 경사 음영(릴리프 강조) ---
          vec3 n = normalize(vNormal);
          float ndl = max(dot(n, normalize(uLightDir)), 0.0);
          // 경사도(1=평평, 0=수직벽): 안와/능선 경계면을 어둡게 해 3D 형태를 살림
          float flatness = clamp(n.y, 0.0, 1.0);
          float slopeShade = 0.78 + 0.22 * flatness;   // 캐주얼: 벽 음영 완화(덜 어둡게)
          // 캐주얼: 앰비언트 크게 → 플랫하고 밝은 소프트 라이팅
          float diff = 0.68 + 0.36 * ndl;
          vec3 col = albedo * diff * slopeShade;

          // rim: 능선 가장자리 살짝 밝게 (뼈 하이라이트)
          col += bone * mixT * pow(ndl, 6.0) * 0.12;

          // 톤 롤오프 없이 clamp (NoToneMapping)
          col = clamp(col, 0.0, 1.0);

          // sRGB 출력
          col = pow(col, vec3(1.0 / 2.2));

          // fog
          float fogFactor = smoothstep(fogNear, fogFar, vFogDepth);
          col = mix(col, fogColor, fogFactor);

          gl_FragColor = vec4(col, 1.0);
        }
      `
    });
  }

  function addPitFrame() {
    const wallH = HEIGHT_SCALE * START_DEPTH * 1.02;
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1b, roughness: 1.0, metalness: 0 });
    const t = 0.5;
    const half = wallH / 2;
    const grp = new THREE.Group();
    function wall(w, d, x, z) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, wallH, d), wallMat);
      m.position.set(x, half - wallH * 0.5 - 0.0, z);
      m.receiveShadow = true;
      grp.add(m);
    }
    const hw = WORLD_W / 2, hh = WORLD_H / 2;
    wall(WORLD_W + t * 2, t, 0, -hh - t / 2);
    wall(WORLD_W + t * 2, t, 0, hh + t / 2);
    wall(t, WORLD_H, -hw - t / 2, 0);
    wall(t, WORLD_H, hw + t / 2, 0);
    // 바닥판(어두운) — 완전히 파냈을 때 뒤 비침 방지
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(WORLD_W + 2, WORLD_H + 2),
      new THREE.MeshStandardMaterial({ color: 0x241a10, roughness: 1 }));
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.05;
    floor.receiveShadow = true;
    grp.add(floor);
    scene.add(grp);
  }

  function onResize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, true);   // updateStyle=true: 캔버스 CSS크기=뷰포트 (안 그러면 DPR배 CSS로 커져 좌상단만 보임)
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    // 세로형 발굴 시점: 위에서 앞으로 살짝 기울여 두개골(발굴 대상)이 프레임에 꽉.
    //   두개골 반경 X±5, Z±10 → 여유 포함 영역을 가로·세로 둘 다 담는 거리로.
    //   (portrait에선 가로 시야가 좁아 가로 맞춤이 더 멀리 필요할 수 있으므로 max)
    const vfov = camera.fov * Math.PI / 180;
    const hfov = 2 * Math.atan(Math.tan(vfov / 2) * camera.aspect);
    const halfW = 6.5;   // 담을 가로 반폭 (두개골 X±5 + 여유)
    const halfH = 12.0;  // 담을 세로 반길이 (두개골 Z±10 + 여유)
    const distForH = halfH / Math.tan(vfov / 2);
    const distForW = halfW / Math.tan(hfov / 2);
    const fitDist = Math.max(distForH, distForW);
    const tilt = THREE.MathUtils.degToRad(16);                // 수직에서 16° 기움(오버헤드 3/4)
    camera.up.set(0, 1, 0);
    camera.position.set(0, fitDist * Math.cos(tilt), fitDist * Math.sin(tilt));
    camera.lookAt(0, HEIGHT_SCALE * START_DEPTH * 0.35, 0);
    camera.updateMatrixWorld(true);
  }

  // ============================================================
  // 하이트맵 → 지오메트리 반영
  // ============================================================
  function renderY(i) {
    const s = soilTop[i], o = objTop[i];
    return (s > o ? s : o) * HEIGHT_SCALE;   // max(soil,obj)
  }

  // per-vertex reveal(0..1) + layer(0..1) 계산 → 셰이더가 텍스처 mix + 층 tint
  //  reveal은 흙을 표면 가까이 팠을 때만 오른다(안 판 흙은 완전히 뼈를 가림).
  //  BAND는 objTop 최고점의 초기 덮임(=START_DEPTH-objMaxTop)보다 작아야
  //  0%에서 뼈가 안 비친다. (TOP_FRAC=0.66 → 최고점 초기덮임 ~0.34)
  //  작게 잡아 시각 노출(텍스처 블렌드)이 상태 발굴률과 어긋나지 않게 한다(바가 뒤처져 보이는 문제 방지).
  //  min overburden(≈0.82*SD)보다 훨씬 작아 0%에서 뼈 안 비침.
  const REVEAL_BAND = START_DEPTH * 0.11;
  // 실물 3D 모델 방식(2026-07-01): 발굴 대상은 씬의 glb 모델이고 terrain은 '순수 흙'이다.
  //  → reveal(뼈 크림 블렌드)·layer(층 tint)를 끈다(항상 0). 판 곳은 셰이더 pitShade가
  //    깊이에 따라 어둡게 처리 → 흙 구덩이로 보인다.
  function revealFor(i) { return 0; }
  // 발굴 위치 힌트 제거(사용자 2026-07-02: 흙색 구분되면 찾는 재미↓). terrain=순수 흙.
  function layerFor(i)  { return 0; }

  // 전체 초기 반영 (reveal→color.r, layer→color.g, 높이→posAttr Y)
  function fullSync() {
    const p = posAttr.array, rc = revealAttr.array;
    for (let i = 0; i < N; i++) {
      p[i * 3 + 1] = renderY(i);
      rc[i * 3] = revealFor(i);
      rc[i * 3 + 1] = layerFor(i);
    }
    posAttr.needsUpdate = true;
    revealAttr.needsUpdate = true;
    geo.computeVertexNormals();
  }

  // 증분 반영 (변경된 셀 집합) — 성능
  function syncCells(cells) {
    const p = posAttr.array, rc = revealAttr.array;
    for (let k = 0; k < cells.length; k++) {
      const i = cells[k];
      p[i * 3 + 1] = renderY(i);
      rc[i * 3] = revealFor(i);
      rc[i * 3 + 1] = layerFor(i);
    }
    posAttr.needsUpdate = true;
    revealAttr.needsUpdate = true;
    normalsDirty = true;   // 노멀은 프레임당 1회만 재계산(무거움)
  }
  let normalsDirty = false;

  // ============================================================
  // 발굴 로직
  // ============================================================
  let curTool = "shovel";
  const toolDef = () => TOOL_DEFS[curTool];

  // 격자 셀 (gc,gr)에 현재 도구로 1회 발굴 (레이어-재료 게이트).
  //  각 도구는 자기 층(td.layer)만 제거하고 층 하단 경계(LAYER_FLOOR)에서 멈춘다.
  //  잘못된 층(오브젝트 위)에 쓰면 그 셀은 no-op → 강제 순서 삽→끌→붓.
  //  비-오브젝트 흙(isObj=false, 주변 피트)은 게이트 없이 어떤 도구나 바닥(0)까지 판다.
  //  wrongLayer: 클릭 중심 셀 기준 "이 도구로 안 파이는 층"이면 힌트용으로 그 층 id 반환.
  const _dirtyCells = [];
  function digCell(gc, gr, dirMode) {
    const td = toolDef();
    const R = td.radius;
    const dp = td.depthPerStroke;
    const layer = td.layer;                  // "bulk" | "mid" | "fine"
    const floor = LAYER_FLOOR[layer];        // 이 도구가 오브젝트 위에서 도달하는 최소 soilAbove
    _dirtyCells.length = 0;
    let anyChange = false, revealedHere = false;
    const R2 = R * R;
    for (let dr = -R; dr <= R; dr++) {
      const rr = gr + dr;
      if (rr < 0 || rr >= ROWS) continue;
      for (let dc = -R; dc <= R; dc++) {
        const cc = gc + dc;
        if (cc < 0 || cc >= COLS) continue;
        const d2 = dc * dc + dr * dr;
        if (d2 > R2) continue;
        const i = rr * COLS + cc;
        // falloff (중심 1 → 가장자리 0)
        const dist = Math.sqrt(d2);
        let fall = 1 - dist / (R + 0.5);
        if (fall <= 0) continue;
        fall = fall * fall * (3 - 2 * fall); // smoothstep

        let minSoil;                         // 이 셀에서 이 도구가 내려갈 수 있는 최소 흙표면
        if (isObj[i]) {
          // ── 오브젝트 셀: 레이어 게이트 ──
          const soilAbove = soilTop[i] - objTop[i];
          if (!canDig(layer, soilAbove)) continue;   // 담당 밴드(+GRACE) 밖 → no-op
          minSoil = objTop[i] + floor;       // 층 하단 경계에서 멈춤(붓 floor=0 → objTop)
        } else {
          // ── 비-오브젝트 흙: 게이트 없이 바닥(0)까지 ──
          minSoil = 0;
        }

        let ns = soilTop[i] - dp * fall;
        if (ns < minSoil) ns = minSoil;      // 층 하단(또는 바닥) 클램프 — 절대 넘어가지 않음
        if (ns < soilTop[i] - 1e-6) {
          soilTop[i] = ns;
          anyChange = true;
          _dirtyCells.push(i);
          if (isObj[i] && Math.abs(soilTop[i] - objTop[i]) <= TOL) revealedHere = true;
        }
      }
    }
    if (anyChange) {
      syncCells(_dirtyCells);
      // 파티클/연출 (파손 없음)
      const wy = renderY(gr * COLS + gc);
      spawnEffect(gc, gr, wy, td, dirMode);
    }
    // 아무것도 안 파였으면(no-op) 중심 셀이 오브젝트 위 다른 층인지 확인 → 힌트용
    let wrongLayer = null;
    if (!anyChange) {
      const ci = gr * COLS + gc;
      if (isObj[ci]) {
        const soilAbove = soilTop[ci] - objTop[ci];
        if (!canDig(layer, soilAbove) && soilAbove > TOL) wrongLayer = layerAt(soilAbove);
      }
    }
    return { change: anyChange, revealed: revealedHere, wrongLayer: wrongLayer };
  }

  // 정규화(0..1) → 격자 (gc,gr)
  function nxyToCell(nx, ny) {
    let gc = Math.round(nx * (COLS - 1));
    let gr = Math.round(ny * (ROWS - 1));
    gc = Math.max(0, Math.min(COLS - 1, gc));
    gr = Math.max(0, Math.min(ROWS - 1, gr));
    return [gc, gr];
  }

  // 셀 격자좌표 → 월드 XZ (그리드 중심)
  function cellToWorld(gc, gr) {
    const x = (gc / (COLS - 1) - 0.5) * WORLD_W;
    const z = (gr / (ROWS - 1) - 0.5) * WORLD_H;
    return [x, z];
  }

  // ============================================================
  // 진행률 / 상태
  // ============================================================
  let cleared = false;
  function computeState() {
    let revealed = 0;
    for (let i = 0; i < N; i++) {
      if (!isObj[i]) continue;
      if (soilTop[i] <= objTop[i] + TOL) revealed++;   // 손상 개념 없음 → 노출 여부만
    }
    const revealFrac = totalObjCols ? revealed / totalObjCols : 0;
    return { revealed, revealFrac };
  }

  function updateHUD() {
    const st = computeState();
    const pct = Math.round(st.revealFrac * 100);
    document.getElementById("reveal-fill").style.width = (st.revealFrac * 100).toFixed(1) + "%";
    document.getElementById("reveal-val").textContent = pct + "%";

    // 클리어 판정: '표시값(반올림)이 100%면' 클리어. 표시 100% ↔ 실제 revealFrac(≈0.995~1.0)의
    // 반올림 간극 때문에 "100% 표시인데 종료 안 됨" 버그(2026-07-01)를 없앤다. finishClear가
    // 남은 흙 필름을 objTop까지 완전히 걷어 깨끗이 노출한 뒤 CLEAR로 이어지므로 조기 종료감 없음.
    if (!cleared && pct >= 100) {
      cleared = true; finishClear();
    }
    return st;
  }

  // 잘못된 도구 힌트 토스트 (은은하게, 스로틀). 실패 아님.
  let _hintTimer = null, _hintCooldown = 0;
  function showHint(layer) {
    if (_hintCooldown > 0) return;
    _hintCooldown = 1.1;
    const el = document.getElementById("hint");
    el.textContent = LAYER_HINT[layer] || "다른 도구가 필요해요";
    el.classList.add("show");
    if (_hintTimer) clearTimeout(_hintTimer);
    _hintTimer = setTimeout(function () { el.classList.remove("show"); }, 900);
    // 아주 가벼운 무효 진동 (틱)
    if (navigator.vibrate) { try { navigator.vibrate(6); } catch (e) {} }
  }

  // 100% 도달 시: 남은 흙 필름(TOL 이내지만 아직 덮인)을 완전히 걷어 오브젝트를 깨끗이 노출 →
  // gleam 비트를 준 뒤 CLEAR 오버레이. (사용자 2026-07-01: "100%인데 덜 판 채로 갑자기 끝나는 느낌")
  function finishClear() {
    for (let i = 0; i < N; i++) { if (isObj[i] && soilTop[i] > objTop[i]) soilTop[i] = objTop[i]; }
    fullSync();          // 마지막 흙 필름 제거된 깨끗한 표면으로 리페인트
    triggerWinShine();   // 발굴 완료 반짝
    startObjRise();      // 발굴 대상 모델이 땅 밖으로 솟아오름(사용자 요청 연출)
    document.getElementById("reveal-fill").style.width = "100%";
    document.getElementById("reveal-val").textContent = "100%";
    setTimeout(function(){ showOverlay(); }, 1150);   // 상승 연출(≈0.9s) 본 뒤 마무리
  }

  // 클리어 전용 오버레이 (fail 없음 — 손상/실패 기믹 제거).
  function showOverlay() {
    const ov = document.getElementById("overlay");
    ov.className = "show win";
    document.getElementById("ov-title").textContent = "CLEAR!";
    let sub = "완벽하게 발굴했어요!";
    // 인카운터(지도 셸에서 진입)면 발견물 이름을 자막에 표시
    if (ENCOUNTER.active && ENCOUNTER.name) sub = ENCOUNTER.name + " 발굴 성공!";
    document.getElementById("ov-sub").textContent = sub;
    playSfx("clear");
    if (navigator.vibrate) { try { navigator.vibrate([30, 40, 60]); } catch (e) {} }
    notifyComplete();   // 부모 셸/도감으로 발견 통지 (단독이면 localStorage에만)
  }

  // ============================================================
  // 파티클 (풀링)
  // ============================================================
  const P_CHUNK = 240, P_DUST = 160, P_SAND = 260;
  let chunkPool, dustPool, sandPool;
  const G = -22;   // 중력

  function makePool(count, geoBuild, matBuild) {
    const mesh = new THREE.InstancedMesh(geoBuild(), matBuild(), count);
    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    mesh.frustumCulled = false;
    mesh.castShadow = false;
    const dat = [];
    for (let i = 0; i < count; i++) dat.push({ alive: false, x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0, life: 0, max: 1, s: 1, rot: 0, vrot: 0 });
    // 초기: 화면 밖으로
    const m = new THREE.Matrix4();
    m.makeScale(0, 0, 0);
    for (let i = 0; i < count; i++) mesh.setMatrixAt(i, m);
    mesh.instanceMatrix.needsUpdate = true;
    scene.add(mesh);
    return { mesh, dat, cursor: 0, count };
  }

  // Soft round particle sprite (radial alpha) so billboards read as SOFT dust/sand — not hard
  // flat squares (user 2026-07-01: "위에서 내려오는 이상한 파티클" = the big pale square dust planes).
  let _softTex = null;
  function softSprite() {
    if (_softTex) return _softTex;
    const s = 64, cv = document.createElement('canvas'); cv.width = cv.height = s;
    const cx = cv.getContext('2d'); const g = cx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
    g.addColorStop(0, 'rgba(255,255,255,1)'); g.addColorStop(0.55, 'rgba(255,255,255,0.85)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    cx.fillStyle = g; cx.fillRect(0, 0, s, s);
    _softTex = new THREE.CanvasTexture(cv); return _softTex;
  }
  function initParticles() {
    const soft = softSprite();
    chunkPool = makePool(P_CHUNK,
      () => new THREE.BoxGeometry(1, 1, 1),
      () => new THREE.MeshStandardMaterial({ color: 0x5a3f27, roughness: 1, metalness: 0, vertexColors: false }));
    // dust/sand = SOFT round billboards (radial-alpha sprite), tinted by color
    dustPool = makePool(P_DUST,
      () => new THREE.PlaneGeometry(1, 1),
      () => new THREE.MeshBasicMaterial({ map: soft, color: 0x9a7850, transparent: true, opacity: 0.42, depthWrite: false }));
    sandPool = makePool(P_SAND,
      () => new THREE.PlaneGeometry(1, 1),
      () => new THREE.MeshBasicMaterial({ map: soft, color: 0xcdb98a, transparent: true, opacity: 0.9, depthWrite: false }));
  }

  function poolSpawn(pool) {
    // 링버퍼: 다음 슬롯 (죽은 것 우선)
    let idx = -1;
    for (let k = 0; k < pool.count; k++) {
      const j = (pool.cursor + k) % pool.count;
      if (!pool.dat[j].alive) { idx = j; break; }
    }
    if (idx < 0) { idx = pool.cursor % pool.count; }   // 다 살아있으면 재사용
    pool.cursor = (idx + 1) % pool.count;
    return pool.dat[idx], idx;
  }

  const _mtx = new THREE.Matrix4(), _q = new THREE.Quaternion(), _pos = new THREE.Vector3(), _scl = new THREE.Vector3();
  const _euler = new THREE.Euler();

  function spawnEffect(gc, gr, wy, td, dirMode) {
    // FLYING PARTICLES REMOVED (사용자 2026-07-01: 먼지·모래·흙덩이 파편 모두 위에서 보면 이상함).
    // 발굴 피드백 = 지형(하이트맵)이 실제로 파여 사라지는 것 + 사운드 + 햅틱 만으로 (더 사실적).
    // 복원 시: 삽/끌=chunkPool, 붓=sandPool, 먼지=dustPool 스폰 블록을 되살리면 됨.
  }

  function stepPool(pool, dt, billboard, useGravity) {
    let anyAlive = false;
    for (let i = 0; i < pool.count; i++) {
      const d = pool.dat[i];
      if (!d.alive) continue;
      d.life += dt;
      if (d.life >= d.max) {
        d.alive = false;
        _mtx.makeScale(0, 0, 0);
        pool.mesh.setMatrixAt(i, _mtx);
        continue;
      }
      anyAlive = true;
      if (useGravity) d.vy += G * dt;
      d.x += d.vx * dt; d.y += d.vy * dt; d.z += d.vz * dt;
      if (d.y < 0.02) { d.y = 0.02; d.vy *= -0.32; d.vx *= 0.6; d.vz *= 0.6; }
      d.rot += d.vrot * dt;
      const t = d.life / d.max;
      const fade = 1 - t;
      const sc = d.s * (billboard ? (0.6 + fade * 0.8) : 1);
      _pos.set(d.x, d.y, d.z);
      if (billboard) {
        _q.copy(camera.quaternion);
      } else {
        _euler.set(d.rot, d.rot * 0.7, d.rot * 0.3);
        _q.setFromEuler(_euler);
      }
      _scl.set(sc, sc, sc);
      _mtx.compose(_pos, _q, _scl);
      pool.mesh.setMatrixAt(i, _mtx);
      // 빌보드 페이드(opacity는 공유 재질이라 개별 불가 → 스케일로 대체)
    }
    if (anyAlive || pool._dirty) {
      pool.mesh.instanceMatrix.needsUpdate = true;
      pool._dirty = anyAlive;
    }
    return anyAlive;
  }

  // ============================================================
  // 승리 반짝
  // ============================================================
  let winShine = 0;
  function triggerWinShine() { winShine = 1.2; }

  // ============================================================
  // 사운드 — Web Audio 매니저 (디코드 1회 → 버퍼 재사용, iOS resume)
  //   삽/끌=shovel/chisel, 붓=brush, 과굴착=break, 100%=clear.
  //   에셋 부재/디코드 실패 시 조용히 no-op(단일 HTML·앱 양쪽 안전).
  // ============================================================
  const SFX_NAMES = ["shovel", "chisel", "brush", "break", "clear"];
  let audioCtx = null;
  const _sfxBuf = {};        // name → AudioBuffer (or null=실패)
  let _audioReady = false;

  function initAudio() {
    if (_audioReady) return;
    _audioReady = true;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    try { audioCtx = new AC(); } catch (e) { audioCtx = null; return; }
    // data URI 인라인이 있으면(릴리스 베이크) 우선, 없으면 상대경로 fetch(에디터/http)
    const INLINE = window.__SFX_DATA || {};
    SFX_NAMES.forEach((name) => {
      const src = INLINE[name] || ("../assets/audio/sfx_" + name + ".mp3");
      fetch(src).then(r => r.ok ? r.arrayBuffer() : Promise.reject())
        .then(ab => new Promise((res, rej) => audioCtx.decodeAudioData(ab, res, rej)))
        .then(buf => { _sfxBuf[name] = buf; })
        .catch(() => { _sfxBuf[name] = null; });
    });
  }

  // 첫 제스처에 resume (iOS autoplay 정책)
  function resumeAudio() {
    initAudio();
    if (audioCtx && audioCtx.state === "suspended") { try { audioCtx.resume(); } catch (e) {} }
  }

  function playSfx(name) {
    if (!audioCtx) return;
    const buf = _sfxBuf[name];
    if (!buf) return;   // undefined(로딩중) 또는 null(실패) → no-op
    try {
      const s = audioCtx.createBufferSource();
      s.buffer = buf;
      const g = audioCtx.createGain();
      g.gain.value = 0.9;
      s.connect(g); g.connect(audioCtx.destination);
      s.start(0);
    } catch (e) { /* no-op */ }
  }

  // ============================================================
  // 입력 (포인터 다운/드래그 → 레이캐스트 → 발굴)
  // ============================================================
  let pointerDown = false, lastCell = null, lastWorld = null;
  let sfxCooldown = 0;

  function screenToNDC(clientX, clientY) {
    ndc.x = (clientX / window.innerWidth) * 2 - 1;
    ndc.y = -(clientY / window.innerHeight) * 2 + 1;
  }

  function raycastCell(clientX, clientY) {
    screenToNDC(clientX, clientY);
    raycaster.setFromCamera(ndc, camera);
    const hit = raycaster.intersectObject(terrain, false);
    if (!hit.length) return null;
    const p = hit[0].point;
    // 월드 XZ → 정규화 → 셀
    const nx = (p.x / WORLD_W + 0.5);
    const ny = (p.z / WORLD_H + 0.5);
    const gc = Math.max(0, Math.min(COLS - 1, Math.round(nx * (COLS - 1))));
    const gr = Math.max(0, Math.min(ROWS - 1, Math.round(ny * (ROWS - 1))));
    return { gc, gr, wx: p.x, wz: p.z };
  }

  function doDig(gc, gr, dirMode) {
    if (cleared) return;
    const res = digCell(gc, gr, dirMode);
    if (res.change) {
      const td = toolDef();
      if (sfxCooldown <= 0) { playSfx(td.sfx); sfxCooldown = 0.09; }
      if (navigator.vibrate) { try { navigator.vibrate(td.haptic); } catch (e) {} }
      updateHUD();
    } else if (res.wrongLayer) {
      // 잘못된 층에 잘못된 도구 → 은은한 힌트(실패 아님)
      showHint(res.wrongLayer);
    }
  }

  function onPointer(clientX, clientY) {
    const c = raycastCell(clientX, clientY);
    if (!c) return;
    let dir = null;
    const [wx, wz] = cellToWorld(c.gc, c.gr);
    if (lastWorld) dir = { x: wx - lastWorld.x, z: wz - lastWorld.z };
    lastWorld = { x: wx, z: wz };
    // 같은 셀 연타 방지 없음(연속 발굴 허용). 하지만 이웃까지 보간 발굴은 생략(POC)
    doDig(c.gc, c.gr, dir);
  }

  function bindInput() {
    const el = renderer.domElement;
    // 첫 제스처에 오디오 언락 (iOS) — 캔버스+툴바 어디든
    const unlock = () => { resumeAudio(); };
    window.addEventListener("pointerdown", unlock, { once: true });
    window.addEventListener("touchstart", unlock, { once: true });
    el.addEventListener("pointerdown", (e) => {
      pointerDown = true; lastWorld = null;
      el.setPointerCapture && el.setPointerCapture(e.pointerId);
      onPointer(e.clientX, e.clientY);
    });
    el.addEventListener("pointermove", (e) => {
      if (!pointerDown) return;
      onPointer(e.clientX, e.clientY);
    });
    const up = () => { pointerDown = false; lastWorld = null; };
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
    el.addEventListener("pointerleave", up);
  }

  // ============================================================
  // 도구 바 UI
  // ============================================================
  function buildToolbar() {
    const bar = document.getElementById("toolbar");
    bar.innerHTML = "";
    // 단일 도구(삽 전용)면 도구 UI를 아예 표시하지 않는다(사용자 2026-07-01: "삽 UI는 넣지마").
    if (STAGE.tools.length <= 1) { bar.style.display = "none"; return; }
    bar.style.display = "";
    STAGE.tools.forEach((tk) => {
      const def = TOOL_DEFS[tk];
      const b = document.createElement("button");
      b.className = "tool-btn" + (tk === curTool ? " active" : "");
      b.dataset.tool = tk;
      b.innerHTML = `<span class="tool-ico">${def.ico}</span><span class="tool-name">${def.name}</span>`;
      b.addEventListener("click", () => setTool(tk));
      bar.appendChild(b);
    });
  }
  function setTool(tk) {
    if (!TOOL_DEFS[tk]) return;
    curTool = tk;
    document.querySelectorAll(".tool-btn").forEach((b) => {
      b.classList.toggle("active", b.dataset.tool === tk);
    });
  }

  // ============================================================
  // 리셋
  // ============================================================
  function resetGame() {
    soilTop.fill(START_DEPTH);
    buildObjTop();
    cleared = false;
    winShine = 0;
    _hintCooldown = 0;
    if (_hintTimer) { clearTimeout(_hintTimer); _hintTimer = null; }
    const hintEl = document.getElementById("hint"); if (hintEl) hintEl.classList.remove("show");
    // 파티클 죽이기
    [chunkPool, dustPool, sandPool].forEach((pool) => {
      const m = new THREE.Matrix4(); m.makeScale(0, 0, 0);
      for (let i = 0; i < pool.count; i++) { pool.dat[i].alive = false; pool.mesh.setMatrixAt(i, m); }
      pool.mesh.instanceMatrix.needsUpdate = true;
    });
    fullSync();
    // 발굴 대상 모델 원위치(흙 아래) + 상승/회전 리셋
    objRise = null; objSpin = false;
    if (objGroup) { objGroup.position.set(objCX, OBJ_BASE_Y, objCZ); objGroup.rotation.set(0, 0, 0); }
    document.getElementById("overlay").className = "";
    setTool(STAGE.tools[0]);
    updateHUD();
  }

  // ============================================================
  // 루프
  // ============================================================
  let lastT = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    if (sfxCooldown > 0) sfxCooldown -= dt;
    if (_hintCooldown > 0) _hintCooldown -= dt;

    stepPool(chunkPool, dt, false, true);
    stepPool(dustPool, dt, true, false);
    stepPool(sandPool, dt, true, true);

    if (normalsDirty) { geo.computeVertexNormals(); normalsDirty = false; }

    updateObjAnim(dt);   // 모델 애니(믹서) + 상승(rise) + 전시 회전

    if (winShine > 0) {
      winShine -= dt;
      // 승리 반짝: 카메라를 살짝 두개골로 당겨 하이라이트 (셰이더 emissive 대신 카메라 연출)
    }

    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  // ============================================================
  // QA 훅 (헤드리스 검증)
  // ============================================================
  function installQA() {
    window.__qa = {
      setTool: (name) => setTool(name),
      digAt: (nx, ny) => {
        const [gc, gr] = nxyToCell(nx, ny);
        doDig(gc, gr, { x: 0.2, z: 0.2 });  // 드래그 방향 더미 (붓 연출용)
        return { gc, gr };
      },
      state: () => {
        const st = computeState();
        return {
          revealFrac: st.revealFrac,
          cleared, tool: curTool, totalObjCols
        };
      },
      grid: () => ({ cols: COLS, rows: ROWS }),
      // 발굴 대상 3D 모델/상승 검증
      objKey: () => window.__objKey || null,
      objModelReady: () => !!objModelReady,
      objY: () => objGroup ? objGroup.position.y : null,
      objBaseY: () => OBJ_BASE_Y,
      objRiseTargetY: () => OBJ_RISE_Y,
      objRisen: () => !!objGroup && objGroup.position.y > (OBJ_BASE_Y + (OBJ_RISE_Y - OBJ_BASE_Y) * 0.8),
      objSpinning: () => !!objSpin,
      // 층 경계 (검증/드라이버용). soilAbove 밴드 → 도구.
      layers: () => ({ FINE_TOP, MID_TOP, startDepth: START_DEPTH }),
      // (nx,ny) 셀이 오브젝트 위인지
      isObjAt: (nx, ny) => { const [gc, gr] = nxyToCell(nx, ny); return !!isObj[gr * COLS + gc]; },
      // 안전 단언용: 손상/실패 상태가 코드에 아예 없음을 노출 (undefined면 부재 확인)
      hasDamageModel: () => ({
        brokenFrac: (typeof brokenFor === "function"),   // brokenFor 제거됐으면 false
        failedVar: (typeof window.__failed !== "undefined")
      }),
      // soilAbove(오브젝트/바닥 위 남은 흙) at 정규화 (nx,ny) — 드라이버 도구 선택용.
      //   오브젝트 열: soilTop-objTop, 흙 열: soilTop. (음수면 파고듦=손상)
      cellSoil: (nx, ny) => {
        const [gc, gr] = nxyToCell(nx, ny);
        const i = gr * COLS + gc;
        const ref = isObj[i] ? objTop[i] : 0;
        return soilTop[i] - ref;
      },
      // 전체 soilAbove 그리드 (Float32Array) — 대량 조회용
      soilGrid: () => {
        const out = new Float32Array(N);
        for (let i = 0; i < N; i++) out[i] = soilTop[i] - (isObj[i] ? objTop[i] : 0);
        return Array.from(out);
      },
      startDepth: () => START_DEPTH,
      // 디버그: objTop을 저해상도 ASCII로 (형태/배치 검증용)
      objAscii: (dw, dh) => {
        dw = dw || 24; dh = dh || 32;
        const ramp = " .:-=+*#%@";
        let out = "";
        for (let ry = 0; ry < dh; ry++) {
          let line = "";
          for (let rx = 0; rx < dw; rx++) {
            const c = Math.min(COLS - 1, Math.floor((rx + 0.5) / dw * COLS));
            const r = Math.min(ROWS - 1, Math.floor((ry + 0.5) / dh * ROWS));
            const v = objTop[r * COLS + c] / (START_DEPTH * 0.82);
            line += ramp[Math.max(0, Math.min(9, Math.round(v * 9)))];
          }
          out += line + "\n";
        }
        return out;
      },
      // 편의: 오브젝트 열 목록(정규화 좌표) — 붓 클리어 시뮬용
      objCellsNorm: () => {
        const arr = [];
        for (let i = 0; i < N; i++) {
          if (isObj[i]) {
            const r = (i / COLS) | 0, c = i % COLS;
            arr.push([c / (COLS - 1), r / (ROWS - 1)]);
          }
        }
        return arr;
      },
      reset: () => resetGame(),
      // project a normalized (nx,ny) dig point to CSS screen px (for a demo touch-cursor overlay)
      projNxy: (nx, ny) => {
        const [gc, gr] = nxyToCell(nx, ny); const [wx, wz] = cellToWorld(gc, gr);
        const v = new THREE.Vector3(wx, HEIGHT_SCALE * START_DEPTH * 0.5, wz).project(camera);
        const el = renderer.domElement, r = el.getBoundingClientRect();
        return { x: (v.x * 0.5 + 0.5) * r.width + r.left, y: (-v.y * 0.5 + 0.5) * r.height + r.top };
      },
      // 머니샷 검증용: 주변 흙을 걷어 오브젝트만 노출 (형태 육안 확인)
      _stripSoil: () => {
        for (let i = 0; i < N; i++) soilTop[i] = isObj[i] ? objTop[i] : 0.02;
        fullSync(); updateHUD();
      }
    };
  }

  // ============================================================
  // BOOT
  // ============================================================
  // 치트(?cheat=1): 즉시발굴 버튼 — 오브젝트 위 흙 전부 제거 → 100% → finishClear(상승+오버레이).
  function addCheatButton() {
    const b = document.createElement("button");
    b.textContent = "⚡ 즉시발굴";
    b.style.cssText = "position:fixed;right:12px;bottom:calc(env(safe-area-inset-bottom,0px) + 16px);z-index:2200;"
      + "padding:11px 15px;border-radius:13px;border:1px solid #f0c674;background:rgba(90,64,30,.94);color:#ffe6a0;"
      + "font-size:15px;font-weight:800;box-shadow:0 3px 12px rgba(0,0,0,.45);cursor:pointer;";
    b.addEventListener("click", function () {
      if (cleared) return;
      for (let i = 0; i < N; i++) { if (isObj[i] && soilTop[i] > objTop[i]) soilTop[i] = objTop[i]; }
      fullSync(); updateHUD();   // 발굴률 100% → finishClear
    });
    document.body.appendChild(b);
  }

  function boot() {
    if (typeof THREE === "undefined") {
      document.body.innerHTML = "<div style='color:#fff;padding:40px;font:16px sans-serif'>Three.js 로드 실패 (../vendor/three.r128.min.js)</div>";
      return;
    }
    initThree();
    buildObjTop();
    loadObjModel();          // 발굴 대상 실물 3D 모델(흙 아래 배치)
    soilTop.fill(START_DEPTH);
    fullSync();
    buildToolbar();
    setTool(STAGE.tools[0]);
    bindInput();
    initAudio();     // 버퍼 프리로드(디코드 async; 재생은 첫 제스처 resume 후)
    installQA();
    updateHUD();

    document.getElementById("ov-retry").addEventListener("click", resetGame);
    document.getElementById("overlay").addEventListener("click", (e) => {
      if (e.target.id === "overlay" || e.target.id === "ov-sub" || e.target.id === "ov-title") resetGame();
    });
    if (CHEAT) addCheatButton();   // ?cheat=1 → 즉시발굴 치트 버튼

    lastT = performance.now();
    requestAnimationFrame(loop);
    window.__ready = true;
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
