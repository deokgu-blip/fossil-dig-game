<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Fossil Dig — 발굴 지도</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%E2%9B%8F%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="../vendor/maplibre/maplibre-gl.css">
<style>
  :root {
    --bg:#20160d; --panel:#2a1d12; --panel2:#37271a; --line:rgba(255,255,255,.08);
    --gold:#f0c674; --cream:#e8d9bc; --sub:#b7a586;
    --c-common:#8a8f98; --c-uncommon:#4caf7d; --c-rare:#3d8bfd; --c-epic:#a259e6; --c-legendary:#f0a030;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--cream);
    user-select:none; -webkit-user-select:none; }
  /* 지도(밑) + 캐릭터 3D 캔버스(위, 이벤트 통과) 모두 풀뷰포트 */
  #map { position:fixed; inset:0; z-index:1; background:#20304a; }
  .maplibregl-map { background:#20304a; font-family:inherit; }
  /* 지도 위 3D 캐릭터/오브젝트용 오버레이 캔버스는 MapLibre CustomLayer가 #map 내부에 그린다.
     차선책(마커) 캐릭터 스프라이트: */
  .player-sprite { will-change:transform; pointer-events:none; }
  /* MapLibre 저작권/로고는 살짝 어둡게 */
  .maplibregl-ctrl-attrib { font-size:9px; opacity:.55; }
  .maplibregl-ctrl-attrib a { color:var(--sub); }

  /* 상단 헤더 */
  #topbar { position:fixed; left:0; right:0; top:0; z-index:1000;
    padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 10px;
    display:flex; align-items:center; gap:10px; pointer-events:none;
    background:linear-gradient(180deg,rgba(20,14,8,.82),rgba(20,14,8,0)); }
  #region-chip { pointer-events:auto; background:rgba(30,20,12,.82); border:1px solid var(--line);
    border-radius:20px; padding:7px 14px; font-size:14px; font-weight:700; letter-spacing:.2px;
    display:flex; align-items:center; gap:6px; backdrop-filter:blur(4px); }
  #region-chip .flag { font-size:16px; }
  .spacer { flex:1; }
  .icon-btn { pointer-events:auto; width:44px; height:44px; border-radius:14px;
    background:rgba(30,20,12,.82); border:1px solid var(--line); color:var(--cream);
    font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer;
    backdrop-filter:blur(4px); }
  .icon-btn:active { transform:scale(.92); }

  /* 발굴 지점 마커 (기운 3D 지도 위에 upright) */
  .spot-marker { pointer-events:auto; cursor:pointer; will-change:transform;
    width:34px; height:44px; display:flex; align-items:flex-end; justify-content:center; }
  .spot-marker .pin { width:30px; height:30px; border-radius:50% 50% 50% 0; transform:rotate(-45deg);
    border:2px solid rgba(255,255,255,.88); box-shadow:0 3px 8px rgba(0,0,0,.55);
    display:flex; align-items:center; justify-content:center; }
  .spot-marker .pin > span { transform:rotate(45deg); font-size:15px; line-height:1; }
  .spot-marker.pulsing .pin { animation:spinPulse 1.6s ease-in-out infinite; }
  @keyframes spinPulse { 0%,100%{ box-shadow:0 3px 8px rgba(0,0,0,.55);} 50%{ box-shadow:0 3px 16px rgba(240,198,116,.9);} }

  /* 하단 발견 버튼 */
  #discover-bar { position:fixed; left:0; right:0; bottom:0; z-index:1000;
    padding:14px 18px calc(env(safe-area-inset-bottom,0px) + 18px);
    display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none;
    background:linear-gradient(0deg,rgba(20,14,8,.85),rgba(20,14,8,0)); }
  #discover-btn { pointer-events:auto; width:100%; max-width:420px;
    background:linear-gradient(180deg,#ffd884,#f0a030); color:#3a2408; border:none;
    border-radius:18px; padding:16px; font-size:19px; font-weight:800; letter-spacing:.3px;
    cursor:pointer; box-shadow:0 8px 24px rgba(240,160,48,.45); display:none;
    align-items:center; justify-content:center; gap:8px; }
  #discover-btn.show { display:flex; animation:pulse 1.4s ease-in-out infinite; }
  #discover-btn:active { transform:scale(.97); }
  @keyframes pulse { 0%,100%{ box-shadow:0 8px 24px rgba(240,160,48,.45);} 50%{ box-shadow:0 8px 34px rgba(240,160,48,.85);} }
  #hint { pointer-events:none; font-size:12.5px; color:var(--sub); background:rgba(20,14,8,.6);
    padding:5px 12px; border-radius:12px; text-align:center; max-width:90%; }

  /* mock 컨트롤 (개발용) */
  #mock-pad { position:fixed; right:14px; bottom:calc(env(safe-area-inset-bottom,0px) + 120px);
    z-index:1000; display:none; grid-template-columns:repeat(3,44px); grid-template-rows:repeat(3,44px);
    gap:4px; }
  #mock-pad.show { display:grid; }
  #mock-pad button { border-radius:11px; background:rgba(30,20,12,.86); border:1px solid var(--line);
    color:var(--cream); font-size:18px; cursor:pointer; }
  #mock-pad button:active { background:var(--gold); color:#3a2408; }
  #mock-pad .mid { background:rgba(60,42,26,.9); }
  #mock-badge { position:fixed; left:14px; bottom:calc(env(safe-area-inset-bottom,0px) + 120px);
    z-index:1000; display:none; background:rgba(120,60,20,.9); color:#ffe6c0; font-size:11px;
    font-weight:800; padding:5px 10px; border-radius:10px; letter-spacing:.5px; }
  #mock-badge.show { display:block; }

  /* 발굴게임 iframe 오버레이 */
  #dig-overlay { position:fixed; inset:0; z-index:2000; display:none; background:#1a130c; }
  #dig-overlay.show { display:block; }
  #dig-frame { width:100%; height:100%; border:0; display:block; }
  #dig-close { position:fixed; top:calc(env(safe-area-inset-top,0px) + 10px); left:12px; z-index:2100;
    width:40px; height:40px; border-radius:12px; background:rgba(20,14,8,.7); color:#fff; border:1px solid var(--line);
    font-size:20px; cursor:pointer; display:none; }
  #dig-overlay.show #dig-close { display:block; }

  /* 발견 결과 토스트 */
  #result { position:fixed; inset:0; z-index:2500; display:none; align-items:center; justify-content:center;
    background:rgba(10,7,4,.78); backdrop-filter:blur(4px); padding:26px; }
  #result.show { display:flex; animation:fade .35s ease; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  .result-card { width:100%; max-width:360px; background:linear-gradient(180deg,#3a2a1b,#26190f);
    border:1px solid var(--line); border-radius:22px; padding:26px 22px; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.6); }
  .result-card .eyebrow { font-size:13px; color:var(--gold); font-weight:800; letter-spacing:2px; }
  .result-card .icon { font-size:64px; margin:12px 0 6px; }
  .result-card .name { font-size:23px; font-weight:800; margin-bottom:4px; }
  .result-card .meta { font-size:13.5px; color:var(--sub); margin-bottom:16px; }
  .rarity-badge { display:inline-block; font-size:12px; font-weight:800; letter-spacing:.5px;
    padding:4px 12px; border-radius:20px; margin-bottom:16px; }
  .result-card button { width:100%; background:var(--gold); color:#3a2408; border:none; border-radius:14px;
    padding:14px; font-size:16px; font-weight:800; cursor:pointer; }
  .result-card button:active { transform:scale(.97); }

  /* 도감 화면 */
  #collection { position:fixed; inset:0; z-index:3000; display:none; flex-direction:column;
    background:var(--bg); }
  #collection.show { display:flex; }
  #col-head { padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 12px; display:flex; align-items:center; gap:12px;
    border-bottom:1px solid var(--line); background:var(--panel); }
  #col-head h1 { font-size:19px; font-weight:800; }
  #col-head .count { margin-left:auto; font-size:13px; color:var(--sub); }
  #col-back { width:40px; height:40px; border-radius:12px; background:var(--panel2); color:var(--cream);
    border:1px solid var(--line); font-size:20px; cursor:pointer; }
  #col-grid { flex:1; overflow-y:auto; padding:14px; display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; align-content:start; }
  .col-card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:14px 12px;
    text-align:center; position:relative; }
  .col-card.locked { opacity:.55; }
  .col-card .cc-icon { font-size:40px; line-height:1; margin-bottom:6px;
    filter:none; }
  .col-card.locked .cc-icon { filter:brightness(0) invert(.3); }
  .col-card .cc-name { font-size:13px; font-weight:700; min-height:34px; display:flex; align-items:center; justify-content:center; }
  .col-card .cc-region { font-size:11px; color:var(--sub); margin-top:3px; }
  .col-card .cc-qty { position:absolute; top:8px; right:8px; background:rgba(0,0,0,.4); border-radius:10px;
    font-size:11px; font-weight:800; padding:2px 7px; }
  .col-card .cc-rarity { display:inline-block; font-size:10px; font-weight:800; letter-spacing:.4px;
    padding:2px 8px; border-radius:10px; margin-top:6px; }
  /* 3D 에셋 크레딧(CC-BY 저작자 표기) — 라이선스 준수 */
  #col-credits { padding:12px 16px calc(env(safe-area-inset-bottom,0px) + 14px); border-top:1px solid var(--line);
    color:var(--sub); font-size:10.5px; line-height:1.5; text-align:center; }
  #col-credits .cc-title { font-weight:800; color:var(--cream); margin-bottom:4px; font-size:11px; }
  #col-credits a { color:var(--gold); text-decoration:none; }
  .col-empty { grid-column:1/-1; text-align:center; color:var(--sub); padding:60px 20px; font-size:14px; }

  /* 로딩/토스트 */
  #toast { position:fixed; left:50%; top:calc(env(safe-area-inset-top,0px) + 70px); transform:translateX(-50%);
    z-index:1500; background:rgba(20,14,8,.9); border:1px solid var(--line); color:var(--cream);
    padding:9px 16px; border-radius:20px; font-size:13px; font-weight:600; opacity:0; transition:opacity .3s;
    pointer-events:none; max-width:88%; text-align:center; }
  #toast.show { opacity:1; }
</style>
</head>
<body>
<div id="map"></div>

<div id="topbar">
  <div id="region-chip"><span class="flag">🌍</span><span id="region-name">위치 확인 중…</span></div>
  <div class="spacer"></div>
  <button class="icon-btn" id="btn-locate" title="내 위치">📍</button>
  <button class="icon-btn" id="btn-collection" title="도감">📖</button>
</div>

<div id="mock-badge" class="">MOCK GPS</div>
<div id="mock-pad">
  <span></span><button data-dir="n">▲</button><span></span>
  <button data-dir="w">◀</button><button class="mid" data-dir="c">◎</button><button data-dir="e">▶</button>
  <span></span><button data-dir="s">▼</button><span></span>
</div>

<div id="discover-bar">
  <div id="hint"></div>
  <button id="discover-btn"><span>⛏️</span><span id="discover-label">발견!</span></button>
</div>

<div id="dig-overlay">
  <button id="dig-close">✕</button>
  <iframe id="dig-frame" allow="fullscreen"></iframe>
</div>

<div id="result">
  <div class="result-card">
    <div class="eyebrow">발굴 성공</div>
    <div class="icon" id="r-icon">🦴</div>
    <div class="name" id="r-name">화석</div>
    <div class="rarity-badge" id="r-rarity">COMMON</div>
    <div class="meta" id="r-meta"></div>
    <button id="r-ok">도감에 수집!</button>
  </div>
</div>

<div id="collection">
  <div id="col-head">
    <button id="col-back">‹</button>
    <h1>발굴 도감</h1>
    <span class="count" id="col-count"></span>
  </div>
  <div id="col-grid"></div>
  <div id="col-credits">
    <div class="cc-title">3D 에셋 크레딧</div>
    <div class="cc-line">“Nautilus shell” — Poly by Google · “Amphora” — Bruno Oliveira (CC‑BY 3.0)</div>
    <div class="cc-line">그 외 발굴 모델 — Quaternius (CC0) · <a href="https://poly.pizza" target="_blank" rel="noopener">poly.pizza</a></div>
  </div>
</div>

<div id="toast"></div>

<!-- 벤더: MapLibre GL JS(BSD) + Three.js r128 (상대경로, 이중타깃 호환) -->
<script src="../vendor/maplibre/maplibre-gl.js"></script>
<script src="../vendor/three.r128.min.js"></script>
<script>
(function () {
  "use strict";

  // ==========================================================================
  // 설정
  // ==========================================================================
  const QP = new URLSearchParams(location.search);
  const MOCK = QP.has("mock") ? (QP.get("mock") !== "0") : false;   // ?mock=1 → 개발용 가짜 GPS
  const DIG_URL = "../engine/fossil-dig.html";                       // 발굴게임 (상대경로, 이중타깃 호환)
  const REGIONS_URL = "../stages/regions.json";
  const DISCOVER_RADIUS_M = 40;    // 이 거리 안이면 "발견" 가능
  const SPOT_COUNT = 5;            // 플레이어 주변 스폰 지점 수
  // 스폰 반경(미터) — 사용자 2026-07-01 "채굴위치 반경 100m": 모든 지점이 플레이어 100m 이내.
  const SPOT_MIN_M = 25, SPOT_MAX_M = 100;
  const COOLDOWN_MS = 20000;       // 발굴 후 그 지점 재등장 쿨다운(POC: 제거 후 재스폰)
  const LS_COLLECTION = "fossildig_collection";
  const LS_PENDING = "fossildig_pending";     // 발굴게임이 이중기록하는 큐(L22 폴백)

  // 3D 지도(피크민식 자연 디오라마) 파라미터
  //  liberty(상세 구글식 지도)를 쓰지 않는다. liberty의 '벡터 소스'만 재사용하고
  //  레이어는 우리가 직접 만든 자연 세트(잔디 바닥+흙 패치+숲+연못+흙길)로 교체한다.
  //  ★ 건물(fill-extrusion)은 그리지 않는다 — 사용자 요청: "실제 건물보다 피크민 컨셉 맵".
  const LIBERTY_STYLE_URL = "https://tiles.openfreemap.org/styles/liberty"; // 소스만 빌려옴
  const OFM_VECTOR_TILES = "https://tiles.openfreemap.org/planet";          // fetch 실패 시 소스 폴백
  const MAP_ZOOM = 17.4;           // 캐릭터 걷기 시점(건물이 보이는 근접 줌)
  const MAP_PITCH = 55;            // 기울기(포켓몬고식 3/4뷰)
  const MAP_MAX_PITCH = 62;
  const noStyleQP = QP.has("nostyle");   // 헤드리스/오프라인 테스트: 벡터스타일 스킵(빈 배경)

  // --- 발굴현장(고고학) 디오라마 팔레트 (건물 없음 · 흙길/산길 · 건조한 어스톤) ---
  //   화석/고고학 테마: 마른 흙·모래·바랜 풀이 섞인 발굴장 느낌. 잔디 일변도 → 건조 어스톤.
  //   과하지 않게 — 여전히 아기자기하되 사막/발굴장 톤. 회색·원색 금지.
  const PAL = {
    ground:   "#cdba86",   // 마른 흙/모래 베이스(발굴장 바닥 — 잔디 대신 건조 어스)
    earth:    "#c6a870",   // 흙/어스 패치(다져진 탄)
    grass:    "#b7bd7c",   // landcover grass/meadow — 바랜 마른 풀(그린 낮춤)
    wood:     "#9ca868",   // landcover wood/forest — 마른 관목 그린(채도 낮춤)
    park:     "#b0b878",   // park fill — 바랜 초지
    sand:     "#e0c99a",   // sand — 따뜻한 모래 베이지
    water:    "#8fc7cf",   // 소프트 오아시스/개천 블루(살짝 탁하게)
    // 도로 = 흙길/트레일. 다져진 어스 탄/브라운 채움 + 밝은 케이싱("길만 지도 참고" 룩).
    trailFill:  "#c39c62", // 흙길 채움(어스 탄)
    trailCase:  "#9a7440", // 흙길 가장자리(진한 브라운, 다져진 길 느낌)
    trailFillMinor:"#cfae76", // 좁은 산길 채움(밝은 탄)
    trailCaseMinor:"#a8834e"  // 좁은 산길 가장자리
  };
  // 발굴/고고학 프롭 팔레트(로우폴리 — Three.js). 돌회색/샌드/본아이보리/테라코타.
  const PROP = {
    stone:   0x9a938a,   // 바위/유적 돌회색
    stoneHi: 0xb4ada2,   // 밝은 돌(하이라이트면)
    stoneDk: 0x7d766d,   // 어두운 돌(그림자면)
    sand:    0xd8c090,   // 흙무더기/모래 둔덕
    bone:    0xe9e0c8,   // 반쯤 묻힌 뼈(본 아이보리)
    boneDk:  0xd2c6a6,   // 뼈 그림자
    terra:   0xb5623a,   // 깨진 토기(테라코타)
    terraDk: 0x8f4a2c,   // 토기 그림자
    stake:   0xc98a4a,   // 발굴 말뚝(나무 스테이크)
    stakeTop:0xdd4b3e,   // 말뚝 머리(측량 붉은띠)
    tent:    0xcbb48a,   // 발굴 텐트 캔버스(모래빛)
    tentDk:  0x8a6f45,   // 텐트 폴/그림자
    rope:    0xe8dcc0     // 측량 로프/깃발 끈
  };

  // liberty의 sources(openmaptiles 벡터)만 받아 우리 자연 디오라마 레이어로 교체한 스타일 JSON을 만든다.
  // sourcesOverride 를 주면 그걸 쓰고, 없으면 하드코딩 소스로 폴백한다.
  // ★ 건물은 그리지 않는다(fill-extrusion 레이어 없음). "길만 지도 참고" + 흙/숲/연못.
  function buildMinimalStyle(sourcesOverride) {
    const sources = sourcesOverride || {
      openmaptiles: { type: "vector", url: OFM_VECTOR_TILES }
    };
    const SRC = "openmaptiles";   // OpenFreeMap 벡터 소스 id
    return {
      version: 8,
      name: "fossil-nature",
      // glyphs 키는 아예 생략(라벨/심볼 레이어가 없으므로 폰트 불필요 — 네트워크 절감).
      //  ⚠️ glyphs:null 은 스타일 검증 에러("string expected, null found")로 로드 실패 → 키를 넣지 않는다.
      sources,
      layers: [
        // ① 잔디 그린 바닥(피크민 디오라마 베이스)
        { id: "background", type: "background", paint: { "background-color": PAL.ground } },
        // ② landcover — 은은한 그린 잔디 + 흙/모래 패치 (라벨 없음)
        { id: "lc-grass", type: "fill", source: SRC, "source-layer": "landcover",
          filter: ["match", ["get","class"], ["grass","meadow"], true, false],

        //   실제 도로 geometry(transportation)를 참고하되 룩은 흙길. 라벨 없음. class별 폭.

          paint: { "line-color": PAL.trailCaseMinor,
            "line-width": ["interpolate",["linear"],["zoom"], 13,2, 16,5, 19,12] } },
        //   넓은 흙길 가장자리(다져진 길)
        { id: "trail-major-case", type: "line", source: SRC, "source-layer": "transportation",

            "line-width": ["interpolate",["linear"],["zoom"],
              10, ["match",["get","class"], "motorway",4.5, "trunk",4, "primary",3.5, 2.4],
              16, ["match",["get","class"], "motorway",15, "trunk",13, "primary",11, "secondary",9, 7],
              19, ["match",["get","class"], "motorway",28, "trunk",24, "primary",20, "secondary",16, 11] ] } },

        { id: "trail-minor", type: "line", source: SRC, "source-layer": "transportation",
          filter: ["match", ["get","class"], ["minor","service","street","track","path","pedestrian"], true, false],
          layout: { "line-cap":"round", "line-join":"round" },
          paint: { "line-color": PAL.trailFillMinor,
            "line-width": ["interpolate",["linear"],["zoom"], 13,1, 16,3, 19,8] } },
        //   넓은 흙길 어스 채움
        { id: "trail-major", type: "line", source: SRC, "source-layer": "transportation",
          filter: ["match", ["get","class"], ["motorway","trunk","primary","secondary","tertiary","link"], true, false],
          layout: { "line-cap":"round", "line-join":"round" },
          paint: { "line-color": PAL.trailFill,
            "line-width": ["interpolate",["linear"],["zoom"],
              10, ["match",["get","class"], "motorway",3, "trunk",2.6, "primary",2.2, 1.5],
              16, ["match",["get","class"], "motorway",11, "trunk",9.5, "primary",8, "secondary",6, 4.5],
              19, ["match",["get","class"], "motorway",22, "trunk",18, "primary",15, "secondary",12, 8] ] } }
        // ★ 건물(building fill-extrusion) 레이어 없음 = 피크민식 자연 맵.
        //   그 외(모든 symbol/label: 지명·POI·도로명·transit, housenumber, ne2 raster)도
        //   레이어를 아예 만들지 않음 = 미니멀. "길만 그린" 자연 디오라마.
      ]
    };
  }

  // 지역 loot 테이블 (fetch 실패 시 인라인 폴백 사용)
  let REGIONS = null;
  const REGIONS_FALLBACK = {
    _meta: { rarityColors: { common:"#8a8f98", uncommon:"#4caf7d", rare:"#3d8bfd", epic:"#a259e6", legendary:"#f0a030" } },
    regions: {
      default: { label:"미지의 대지", flag:"🌍", bbox:null, loot:[
        { obj:"ammonite", name:"암모나이트 화석", rarity:"common", weight:30, era:"중생대" },
        { obj:"bone", name:"정체불명의 척추뼈", rarity:"uncommon", weight:20, era:"?" },
        { obj:"dino_skull", name:"이름 없는 공룡 두개골", rarity:"rare", weight:12, era:"중생대" },
        { obj:"relic", name:"수수께끼의 유물", rarity:"epic", weight:4, era:"?" }
      ]}
    }
  };

  // obj 타입 → 도감 아이콘(이모지). POC: 발굴게임 릴리프는 dino_skull 1종이나 라벨은 다양.
  const OBJ_ICON = {
    dino_skull:"🦖", bone:"🦴", egg:"🥚", claw:"🦅", tooth:"🦷", plate:"🛡️",
    footprint:"🐾", fight:"⚔️", bird:"🪶", ammonite:"🐚", trilobite:"🦂",
    relic:"🏺"
  };
  const RARITY_LABEL = { common:"COMMON", uncommon:"UNCOMMON", rare:"RARE", epic:"EPIC", legendary:"LEGENDARY" };
  const RARITY_KR = { common:"흔함", uncommon:"제법", rare:"희귀", epic:"영웅", legendary:"전설" };

  // ==========================================================================
  // 상태
  // ==========================================================================
  let map = null;              // MapLibre 인스턴스
  let mapReady = false;
  let spots = [];              // { id, lat, lng, marker, el, item, cooldownUntil }
  let player = { lat: null, lng: null, acc: null };
  let playerHeading = 0;       // 이동방향(도) — 캐릭터 회전 + bearing 추종용
  let curRegionKey = "default";
  let curRegionMeta = { label:"미지의 대지", flag:"🌍" };
  let activeSpot = null;       // 현재 발굴 중인 spot
  let mockWatchTimer = null;
  let lastGeocodeAt = 0;

  // ==========================================================================
  // 유틸
  // ==========================================================================
  function haversine(a, b, c, d) {   // (lat1,lng1,lat2,lng2) → meters
    const R = 6371000, toR = Math.PI/180;
    const dLat = (c-a)*toR, dLng = (d-b)*toR;
    const s = Math.sin(dLat/2)**2 + Math.cos(a*toR)*Math.cos(c*toR)*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.min(1, Math.sqrt(s)));
  }
  // 미터만큼 떨어진 지점 offset (근사; 소반경이라 충분)
  function offsetMeters(lat, lng, dN, dE) {
    const dLat = dN / 111320;
    const dLng = dE / (111320 * Math.cos(lat * Math.PI/180));
    return [lat + dLat, lng + dLng];
  }
  // 방위각(도, 북=0, 동=90) — (lat1,lng1)→(lat2,lng2)
  function bearingDeg(a, b, c, d) {
    const toR = Math.PI/180, toD = 180/Math.PI;
    const y = Math.sin((d-b)*toR) * Math.cos(c*toR);
    const x = Math.cos(a*toR)*Math.sin(c*toR) - Math.sin(a*toR)*Math.cos(c*toR)*Math.cos((d-b)*toR);
    return (Math.atan2(y, x)*toD + 360) % 360;
  }
  function rand(a, b) { return a + Math.random()*(b-a); }
  function toast(msg, ms) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove("show"), ms||2200);
  }
  function rarityColor(r) {
    const c = (REGIONS && REGIONS._meta && REGIONS._meta.rarityColors) || REGIONS_FALLBACK._meta.rarityColors;
    return c[r] || "#8a8f98";
  }

  // ==========================================================================
  // 지역 판정 (역지오코딩 → coarse bbox 폴백 → default)
  // ==========================================================================
  const COUNTRY_TO_REGION = {
    "kr":"korea", "mn":"mongolia", "eg":"egypt",
    "us":"north_america", "ca":"north_america", "mx":"north_america"
  };
  const EUROPE_CC = new Set(["gb","fr","de","es","it","pt","nl","be","ch","at","se","no","fi","dk",
    "ie","pl","cz","sk","hu","ro","gr","hr","rs","ua","is","lu","si","bg","ee","lv","lt"]);

  function regionFromCC(cc) {
    if (!cc) return null;
    cc = cc.toLowerCase();
    if (COUNTRY_TO_REGION[cc]) return COUNTRY_TO_REGION[cc];
    if (EUROPE_CC.has(cc)) return "europe";
    return null;
  }
  // 좌표 bbox 폴백 (오프라인/지오코드 실패 시). regions.json의 bbox=[minLat,minLng,maxLat,maxLng].
  function regionFromBBox(lat, lng) {
    const rs = (REGIONS && REGIONS.regions) || {};
    for (const key in rs) {
      const bb = rs[key].bbox;
      if (!bb) continue;
      if (lat>=bb[0] && lat<=bb[2] && lng>=bb[1] && lng<=bb[3]) return key;
    }
    return "default";
  }
  // 단일 진입점: 좌표 → 지역키. Nominatim reverse 우선, 실패 시 bbox.
  async function resolveRegion(lat, lng) {
    // Nominatim reverse (User-Agent 헤더). CORS/네트워크 실패 시 catch → bbox.
    try {
      const url = "https://nominatim.openstreetmap.org/reverse?format=json&zoom=3&addressdetails=1&lat="
        + lat + "&lon=" + lng;
      const ctrl = new AbortController();
      const to = setTimeout(()=>ctrl.abort(), 6000);
      const res = await fetch(url, {
        headers: { "Accept":"application/json" },   // UA는 브라우저가 강제(설정 불가) → 서버 정책상 허용됨
        signal: ctrl.signal
      });
      clearTimeout(to);
      if (res.ok) {
        const j = await res.json();
        const cc = j && j.address && j.address.country_code;
        const key = regionFromCC(cc);
        if (key) return { key, source:"nominatim", country: j.address && j.address.country };
      }
    } catch (e) { /* graceful → bbox */ }
    return { key: regionFromBBox(lat, lng), source:"bbox" };
  }

  function setRegion(key) {
    curRegionKey = key;
    const rs = (REGIONS && REGIONS.regions) || {};
    curRegionMeta = rs[key] || REGIONS_FALLBACK.regions.default;
    document.querySelector("#region-chip .flag").textContent = curRegionMeta.flag || "🌍";
    document.getElementById("region-name").textContent = curRegionMeta.label || "미지의 대지";
  }

  // ==========================================================================
  // loot 선택 (가중치 랜덤) — 현재 지역 테이블에서
  // ==========================================================================
  function rollLoot(regionKey) {
    const rs = (REGIONS && REGIONS.regions) || REGIONS_FALLBACK.regions;
    const reg = rs[regionKey] || rs.default || REGIONS_FALLBACK.regions.default;
    const loot = reg.loot || REGIONS_FALLBACK.regions.default.loot;
    let total = 0; for (const l of loot) total += (l.weight||1);
    let x = Math.random()*total;
    for (const l of loot) { x -= (l.weight||1); if (x<=0) return Object.assign({ region: regionKey }, l); }
    return Object.assign({ region: regionKey }, loot[0]);
  }

  // ==========================================================================
  // 도감 (localStorage)
  //   { "<region>|<name>": { obj,name,rarity,region,era,qty,first } }
  // ==========================================================================
  function loadCollection() {
    try { return JSON.parse(localStorage.getItem(LS_COLLECTION) || "{}"); }
    catch (e) { return {}; }
  }
  function saveCollection(c) {
    try { localStorage.setItem(LS_COLLECTION, JSON.stringify(c)); } catch (e) {}
  }
  function collectionKey(item) { return (item.region||"default") + "|" + (item.name||item.obj); }

  // ★★★ 단일 발견 이벤트 초크포인트 — 나중에 Supabase 브로드캐스트를 여기 한 곳에만 추가 ★★★
  function onDiscover(item) {
    const c = loadCollection();
    const k = collectionKey(item);
    if (c[k]) { c[k].qty += 1; }
    else { c[k] = { obj:item.obj, name:item.name, rarity:item.rarity, region:item.region,
                    era:item.era||null, qty:1, first: Date.now() }; }
    saveCollection(c);
    // (미래) 서버 연동 지점:
    //   await supabase.from('discoveries').insert({ user, ...item, at: Date.now() });
    //   supabase.channel('global').send({ type:'broadcast', event:'discover', payload:item });
    return c[k];
  }

  // ==========================================================================
  // 발굴게임 완료 수신 (postMessage + localStorage 폴백 드레인)
  // ==========================================================================
  function drainPending() {
    // 발굴게임이 localStorage에 쌓아둔 완료 이벤트를 흡수(postMessage 유실 대비 — L22)
    try {
      const raw = localStorage.getItem(LS_PENDING);
      if (!raw) return;
      const arr = JSON.parse(raw);
      localStorage.removeItem(LS_PENDING);
      for (const p of arr) handleDigComplete(p, /*fromDrain*/true);
    } catch (e) {}
  }

  let _lastCompleteTs = 0;
  function handleDigComplete(payload, fromDrain) {
    if (!payload || payload.type !== "dig-complete") return;
    // 중복 방지 (postMessage + drain 둘 다 들어올 수 있음)
    if (payload.ts && payload.ts === _lastCompleteTs) return;
    _lastCompleteTs = payload.ts || Date.now();

    // 어떤 spot이었는지 복원 (활성 spot 우선, 없으면 payload로 재구성)
    const item = {
      obj: payload.obj || "dino_skull",
      name: payload.name || (activeSpot && activeSpot.item.name) || payload.obj || "화석",
      rarity: payload.rarity || (activeSpot && activeSpot.item.rarity) || "common",
      region: payload.region || (activeSpot && activeSpot.item.region) || curRegionKey,
      era: (activeSpot && activeSpot.item.era) || null
    };
    const rec = onDiscover(item);        // 도감 기록 (단일 초크포인트)

    // 그 지점 소모 (제거 + 쿨다운 후 재스폰)
    consumeSpot(activeSpot);
    activeSpot = null;

    // 발굴 오버레이 닫고 결과 표시
    closeDig();
    showResult(item, rec.qty);
  }

  window.addEventListener("message", (e) => {
    const d = e.data;
    if (d && d.type === "dig-complete") handleDigComplete(d, false);
  });

  // ==========================================================================
  // 발견 결과 카드
  // ==========================================================================
  function showResult(item, qty) {
    document.getElementById("r-icon").textContent = OBJ_ICON[item.obj] || "🦴";
    document.getElementById("r-name").textContent = item.name;
    const rb = document.getElementById("r-rarity");
    rb.textContent = RARITY_LABEL[item.rarity] || "COMMON";
    rb.style.background = rarityColor(item.rarity);
    rb.style.color = "#1a130c";
    const regLabel = (REGIONS && REGIONS.regions[item.region] && REGIONS.regions[item.region].label) || curRegionMeta.label;
    document.getElementById("r-meta").textContent =
      (item.era ? item.era + " · " : "") + regLabel + (qty>1 ? "  ·  보유 "+qty : "");
    document.getElementById("result").classList.add("show");
  }
  document.getElementById("r-ok").addEventListener("click", () => {
    document.getElementById("result").classList.remove("show");
  });

  // ==========================================================================
  // 발굴게임 오버레이
  // ==========================================================================
  function openDig(item, spot) {
    activeSpot = spot;
    const q = new URLSearchParams({
      obj: item.obj, rarity: item.rarity, region: item.region,
      name: encodeURIComponent(item.name), spot: spot ? spot.id : ""
    });
    const frame = document.getElementById("dig-frame");
    frame.src = DIG_URL + "?" + q.toString();
    document.getElementById("dig-overlay").classList.add("show");
  }
  function closeDig() {
    document.getElementById("dig-overlay").classList.remove("show");
    document.getElementById("dig-frame").src = "about:blank";
  }
  document.getElementById("dig-close").addEventListener("click", () => {
    // 사용자가 중도 포기 — spot은 유지(재도전 가능)
    activeSpot = null;
    closeDig();
  });

  // ==========================================================================
  // 스폰 지점 (MapLibre DOM 마커 — 기운 지도 위 upright, 값싸고 견고)
  // ==========================================================================
  function makeSpotEl(rarity) {
    const col = rarityColor(rarity);
    const wrap = document.createElement("div");
    wrap.className = "spot-marker pulsing";
    wrap.innerHTML = '<div class="pin" style="background:'+col+';"><span>⛏️</span></div>';
    return wrap;
  }
  function spawnSpotsAround(lat, lng) {
    // 기존 제거
    spots.forEach(s => { if (s.marker) s.marker.remove(); });
    spots = [];
    for (let i=0; i<SPOT_COUNT; i++) spawnOneSpot(lat, lng);
    updateDiscover();
  }
  let _spotSeq = 0;
  function spawnOneSpot(lat, lng) {
    const ang = rand(0, Math.PI*2);
    const dist = rand(SPOT_MIN_M, SPOT_MAX_M);
    const [slat, slng] = offsetMeters(lat, lng, Math.cos(ang)*dist, Math.sin(ang)*dist);
    const item = rollLoot(curRegionKey);
    const id = "spot_" + (++_spotSeq);
    let marker = null, el = null;
    if (map && window.maplibregl) {
      el = makeSpotEl(item.rarity);
      // anchor bottom: 핀 꼭지점이 좌표에 닿게
      marker = new maplibregl.Marker({ element: el, anchor: "bottom" })
        .setLngLat([slng, slat]).addTo(map);
      el.addEventListener("click", () => onSpotTap(id));
    }
    spots.push({ id, lat:slat, lng:slng, marker, el, item, cooldownUntil:0 });
  }
  function onSpotTap(id) {
    const s = spots.find(x => x.id === id);
    if (!s) return;
    // 근접(발견 반경) 이내면 바로 발굴, 아니면 안내
    const d = player.lat!=null ? haversine(player.lat, player.lng, s.lat, s.lng) : Infinity;
    if (d <= DISCOVER_RADIUS_M) openDig(s.item, s);
    else toast("가까이 가야 발굴할 수 있어요 · " + Math.round(d) + "m", 1800);
  }
  function consumeSpot(spot) {
    if (!spot) return;
    const idx = spots.indexOf(spot);
    if (idx>=0) {
      if (spot.marker) spot.marker.remove();
      spots.splice(idx, 1);
    }
    // 쿨다운 후 플레이어 주변에 새 지점 하나 재스폰(POC: 항상 놀 거리 유지)
    setTimeout(() => {
      if (player.lat != null) { spawnOneSpot(player.lat, player.lng); updateDiscover(); }
    }, COOLDOWN_MS);
  }

  // ==========================================================================
  // 근접 발견 판정 → 하단 발견 버튼
  // ==========================================================================
  let nearestInRange = null;
  function updateDiscover() {
    if (player.lat == null) return;
    let best = null, bestD = Infinity;
    for (const s of spots) {
      const d = haversine(player.lat, player.lng, s.lat, s.lng);
      if (d < bestD) { bestD = d; best = s; }
    }
    const btn = document.getElementById("discover-btn");
    const hint = document.getElementById("hint");
    if (best && bestD <= DISCOVER_RADIUS_M) {
      nearestInRange = best;
      document.getElementById("discover-label").textContent =
        best.item.name + " 발견!";
      btn.classList.add("show");
      hint.textContent = "";
    } else {
      nearestInRange = null;
      btn.classList.remove("show");
      if (best) {
        hint.textContent = "가장 가까운 발굴 지점까지 " + Math.round(bestD) + "m";
      } else {
        hint.textContent = "주변을 탐색해 발굴 지점을 찾으세요";
      }
    }
  }
  document.getElementById("discover-btn").addEventListener("click", () => {
    if (!nearestInRange) return;
    openDig(nearestInRange.item, nearestInRange);
  });

  // ==========================================================================
  // 플레이어 위치 갱신 (진짜 GPS + mock 공통 진입)
  // ==========================================================================
  let regionResolvedFor = null;   // 마지막으로 지역판정한 대략 좌표
  function onPositionUpdate(lat, lng, acc) {
    const first = (player.lat == null);
    // 이동방향(heading) 갱신 + 이동 감지(walk 애니 트리거) — 캐릭터 회전/카메라 bearing
    if (!first && player.lat != null) {
      const moved = haversine(player.lat, player.lng, lat, lng);
      if (moved > 0.6) {
        playerHeading = bearingDeg(player.lat, player.lng, lat, lng);
        charState.lastMoveAt = performance.now();   // → animateExplorer가 WALK_HOLD_MS 동안 walk 유지
      }
    }
    player.lat = lat; player.lng = lng; player.acc = acc || null;

    // 3D 캐릭터 위치/회전 갱신 (지도 위)
    updatePlayerGraphic(lat, lng);

    if (first) {
      centerCameraOnPlayer(true);
      // 첫 위치 → 지역 판정 + 스폰
      resolveAndSpawn(lat, lng, true);
      regionResolvedFor = [lat, lng];
    } else {
      centerCameraOnPlayer(false);
      // 크게 이동하면(>2km) 지역 재판정 (throttle)
      if (regionResolvedFor && haversine(regionResolvedFor[0], regionResolvedFor[1], lat, lng) > 2000
          && Date.now() - lastGeocodeAt > 8000) {
        resolveAndSpawn(lat, lng, false);
        regionResolvedFor = [lat, lng];
      }
    }
    updateDiscover();
  }

  async function resolveAndSpawn(lat, lng, doSpawn) {
    lastGeocodeAt = Date.now();
    const r = await resolveRegion(lat, lng);
    setRegion(r.key);
    if (r.source === "bbox") toast("위치 서비스 대략 판정: " + curRegionMeta.label, 2600);
    if (doSpawn) spawnSpotsAround(lat, lng);
  }

  // ==========================================================================
  // 3D 지도 (MapLibre GL JS) — 포켓몬고식 카메라
  // ==========================================================================
  function centerCameraOnPlayer(instant) {
    if (!map || player.lat == null) return;
    // ★ 카메라는 '중심 추종'만 한다. 사용자가 드래그로 돌린 bearing/pitch/zoom은 보존.
    //   (첫 위치만 기본 시점으로 점프. 이후엔 center만 부드럽게 이동 → 회전/줌 상태 유지.)
    const target = { center: [player.lng, player.lat] };
    // bearing 이동방향 추종은 옵션(?followbearing)일 때만 — 기본은 사용자 드래그 회전 존중.
    if (QP.has("followbearing")) target.bearing = playerHeading;
    if (instant) {
      target.zoom = MAP_ZOOM;
      target.pitch = MAP_PITCH;   // 최초 진입만 기본 3/4 시점으로 세팅
      map.jumpTo(target);
    } else {
      map.easeTo(Object.assign({ duration: 600, essential: true }, target));
    }
  }

  // liberty 스타일에서 벡터 소스만 꺼내온다(런타임 fetch). 실패하면 null.
  async function fetchOfmSources() {
    try {
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), 6000);
      const res = await fetch(LIBERTY_STYLE_URL, { signal: ctrl.signal, cache: "no-cache" });
      clearTimeout(to);
      if (!res.ok) return null;
      const j = await res.json();
      if (!j || !j.sources) return null;
      // 벡터 소스만 유지(래스터 ne2_shaded 등 상세 배경 제거).
      const out = {};
      for (const [k, v] of Object.entries(j.sources)) {
        if (v && v.type === "vector") out[k] = v;
      }
      return Object.keys(out).length ? out : null;
    } catch (e) { return null; }
  }

  // 단일 포인터(마우스/한 손가락) 드래그 = 화면 회전. (사용자 요청 3·4)
  //   · deltaX → bearing 회전(좌우 드래그로 시점을 빙 돌림). 카메라 중심은 플레이어에 고정 유지.
  //   · deltaY → pitch(위/아래로 기울기 — 선택). maxPitch 안에서 clamp.
  //   dragPan/dragRotate(우클릭 요구)를 껐으므로, 캔버스 pointer 이벤트를 직접 받아 회전만 적용한다.
  //   ★ 회전해도 map.setBearing/​setPitch는 center를 안 바꾸므로 플레이어 중심(추종)이 유지된다.
  //   두 손가락(핀치 줌/회전)은 touchZoomRotate가 처리 → 손가락 1개일 때만 이 커스텀 회전이 동작.
  function installDragRotate(m) {
    const cv = m.getCanvas();
    let dragging = false, lastX = 0, lastY = 0, activeId = null, touchCount = 0;
    const BEARING_PER_PX = 0.35;   // 가로 1px 당 회전(도) — 한 화면폭 드래그로 넉넉히 한 바퀴 근처
    const PITCH_PER_PX   = 0.22;   // 세로 1px 당 pitch(도)
    // 진행 중인 애니(easeTo 추종)와 충돌 방지: 드래그 시작 시 관성/애니 정지.
    function down(e) {
      // 터치가 2개 이상이면 핀치(줌/회전) — 커스텀 단일 회전은 양보.
      touchCount = (e.pointerType === "touch") ? (touchCount + 1) : touchCount;
      if (e.pointerType === "touch" && touchCount > 1) { dragging = false; return; }
      dragging = true; activeId = e.pointerId; lastX = e.clientX; lastY = e.clientY;
      try { m.stop(); } catch (_) {}
      try { cv.setPointerCapture(e.pointerId); } catch (_) {}
    }
    function move(e) {
      if (!dragging || e.pointerId !== activeId) return;
      if (touchCount > 1) return;   // 핀치 중이면 회전 안 함
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      // 좌로 끌면(-dx) 시계방향으로 도는 자연스러운 매핑: bearing += dx*k
      const nb = m.getBearing() + dx * BEARING_PER_PX;
      // 상하 드래그로 pitch(반전 매핑, 2026-07-01: 위로 끌면 세워보기 = pitch↓). clamp(0..maxPitch).
      let np = m.getPitch() - dy * PITCH_PER_PX;
      const maxP = (typeof MAP_MAX_PITCH === "number") ? MAP_MAX_PITCH : 62;
      np = Math.max(0, Math.min(maxP, np));
      m.setBearing(nb);
      m.setPitch(np);
      window.__dragRotated = true;
      if (e.cancelable) e.preventDefault();
    }
    function up(e) {
      if (e.pointerType === "touch") touchCount = Math.max(0, touchCount - 1);
      if (e.pointerId === activeId) { dragging = false; activeId = null;
        try { cv.releasePointerCapture(e.pointerId); } catch (_) {} }
    }
    cv.style.touchAction = "none";   // 브라우저 기본 스크롤/팬 제스처 차단(직접 처리)
    cv.addEventListener("pointerdown", down);
    cv.addEventListener("pointermove", move);
    cv.addEventListener("pointerup", up);
    cv.addEventListener("pointercancel", up);
    // 헤드리스/QA: 코드로 회전 제스처를 흉내내는 훅(pointer 합성이 까다로워 직접 노출).
    window.__simDragRotate = (dxPx, dyPx) => {
      const nb = m.getBearing() + (dxPx||0) * BEARING_PER_PX;
      let np = m.getPitch() - (dyPx||0) * PITCH_PER_PX;
      const maxP = (typeof MAP_MAX_PITCH === "number") ? MAP_MAX_PITCH : 62;
      np = Math.max(0, Math.min(maxP, np));
      m.setBearing(nb); m.setPitch(np); window.__dragRotated = true;
      return { bearing: m.getBearing(), pitch: m.getPitch() };
    };
  }

  // liberty fetch로 얻은 소스로 '초기' 스타일을 만들어 생성자에 넘긴다(setStyle 재로딩 회피 —
  //  setStyle+vector url(TileJSON)은 헤드리스/오프라인에서 스타일 로드가 지연돼 getStyle().layers가
  //  비는 문제가 있다). fetch가 없거나 실패하면 하드코딩 소스로 폴백. 어느 경우든 레이어 세트는 동일.
  async function initMap() {
    if (!window.maplibregl) { console.warn("[map] maplibre 미로딩 — 지도 없이 로직만"); return; }
    const startCenter = [126.9780, 37.5665];  // lng,lat (위치 확정 전 임시)
    let style;
    if (noStyleQP) {
      style = emptyStyle();
      window.__ofmSourceMode = "nostyle";
    } else {
      const srcs = await fetchOfmSources();     // liberty 소스(6s 타임아웃) or null
      window.__ofmSourceMode = srcs ? "liberty-fetch" : "fallback";
      style = buildMinimalStyle(srcs);          // srcs=null이면 하드코딩 소스 폴백
    }
    try {
      map = new maplibregl.Map({
        container: "map",
        style: style,
        center: startCenter,
        zoom: MAP_ZOOM,
        pitch: MAP_PITCH,
        bearing: 0,
        maxPitch: MAP_MAX_PITCH,
        attributionControl: true,
        // 모바일 성능: DPR 캡(레티나에서 과부하 방지)
        pixelRatio: Math.min(window.devicePixelRatio || 1, 1.75),
        // ★ 카메라 조작(사용자 요청):
        //   · 드래그로 지도 이동(dragPan) 비활성화 — 카메라는 항상 플레이어 중심 추종.
        //   · 드래그 = 화면 회전(bearing) — 아래 customDragRotate로 단일 포인터 드래그를 회전에 매핑.
        //     MapLibre 기본 dragRotate는 우클릭/ctrl 필요라 끄고, 커스텀 핸들러로 대체.
        //   · 줌 인/아웃(스크롤/핀치)은 유지. 핀치 회전은 touchZoomRotate로.
        dragPan: false,
        dragRotate: false,
        touchZoomRotate: true,
        touchPitch: false,     // 핀치-두손가락 pitch는 끔(단일 드래그 상하로 pitch 대체)
        keyboard: false,
        fadeDuration: 0
      });
    } catch (e) {
      console.warn("[map] MapLibre 생성 실패, 지도 없이 진행:", e && e.message);
      map = null; return;
    }
    // 안전: 혹시 기본이 켜져 있으면 명시적으로 끈다(버전별 기본값 방어).
    try { if (map.dragPan && map.dragPan.isEnabled()) map.dragPan.disable(); } catch (e) {}
    try { if (map.dragRotate && map.dragRotate.isEnabled()) map.dragRotate.disable(); } catch (e) {}
    // 단일 포인터 드래그 = bearing 회전(+ 상하 드래그 = pitch). 터치/마우스 공통.
    installDragRotate(map);

    // ⚠️ 'load' 이벤트는 스타일 + '초기 가시 타일'까지 다 로드돼야 발화한다.
    //   OpenFreeMap 벡터타일이 (오프라인/헤드리스) 안 뜨면 load가 영영 안 올 수 있다.
    //   → 캐릭터/건물은 '스타일 파싱 완료(styledata + isStyleLoaded)'만으로 얹는다(타일 무관).
    function onStyleReady() {
      if (window.__mapLoaded) return;
      if (!map.isStyleLoaded()) return;   // 스타일 파싱 전이면 다음 styledata에서
      window.__mapLoaded = true;
      mapReady = true;
      addPlayerLayer();        // Three.js 캐릭터 + 자연 식생 CustomLayer
    }
    map.on("styledata", onStyleReady);
    map.on("load", onStyleReady);          // (타일까지 뜨면 여기서도 멱등 처리)
    map.on("error", (e) => {
      // 타일/스프라이트/글리프 네트워크 실패 → graceful. 콘솔에러로 죽지 않게 흡수.
      const msg = (e && e.error && e.error.message) || "map error";
      console.warn("[map] (graceful)", msg);
      window.__mapErrorCount = (window.__mapErrorCount||0) + 1;
    });
    // 최후 백업: 스타일 이벤트가 지연돼도 일정 시간 후 강제 시도(멱등).
    //   빈 스타일/오프라인처럼 isStyleLoaded가 늦게/애매하게 오는 경우까지 캐릭터를 반드시 얹는다.
    setTimeout(() => {
      try {
        onStyleReady();
        if (!window.__playerLayerAdded) { window.__mapLoaded = true; mapReady = true; addPlayerLayer(); }
      } catch (e) {}
    }, 1500);
  }

  // 완전 빈 스타일(오프라인/헤드리스) — 파스텔 바닥만 (미니멀 톤 유지)
  //  glyphs 키는 생략(null이면 검증 에러). 심볼 레이어가 없어 폰트 불필요.
  function emptyStyle() {
    return { version: 8, name: "empty",
      sources: {},
      layers: [ { id:"bg", type:"background", paint:{ "background-color":PAL.ground } } ] };
  }

  // ==========================================================================
  // 3D 캐릭터 (탐험가) — MapLibre CustomLayer + Three.js
  //   Mercator 매트릭스에 정합(threebox 방식의 커스텀 매트릭스).
  //   정합 실패/렌더 불가면 DOM 마커 스프라이트로 폴백.
  // ==========================================================================
  let charState = {
    lng: 126.9780, lat: 37.5665, headingRad: 0,   // 렌더 대상 위치/회전
    layerAdded: false, three: null, useMarker: false, markerObj: null, markerEl: null,
    // --- 애니메이션 상태 ---
    anim: "idle",          // 현재 표시 애니("idle" | "walk")
    walkAmt: 0,            // 0(idle)↔1(walk) 부드러운 블렌드 계수
    lastMoveAt: 0,         // 마지막 이동 감지 시각(performance.now)
    parts: null            // buildExplorer가 채우는 애니용 파트 핸들
  };
  const WALK_HOLD_MS = 550;   // 마지막 이동 후 이 시간 안이면 walk 유지(정지 판정 지연 → 튀는 전환 방지)

  // 로우폴리 탐험가 메시 생성 (절차적, 어스톤) + 애니용 파트 핸들 반환.
  //  ⚠️ Mercator는 Z가 위(altitude)다 → 모델을 처음부터 **Z-up**으로 세워 만든다
  //     (feet at z=0, head at +z). 정면 = +Y(mercator y는 남쪽이 +지만 heading yaw로 보정).
  //     이렇게 하면 render 매트릭스는 translate+scale+rotateZ(heading)만으로 정합돼
  //     rotateX/Y-flip 조합의 '캐릭터가 땅에 파묻히거나 뒤집히는' 정합오류가 없다.
  //  ⚠️ 걷기 스윙(다리/팔 앞뒤 스윙)은 좌우축(모델 X축) 기준 회전이어야 하고, 스윙 피벗이
  //     엉덩이/어깨(관절)에 오도록 파트를 **피벗 그룹(pivot)**에 담아 회전시킨다(중심회전이면 발이
  //     원 그리며 어긋남). 각 pivot을 charState.parts에 넘겨 render 루프가 시간기반으로 흔든다.
  function buildExplorer(THREE) {
    const grp = new THREE.Group();
    const M = (col, rough) => new THREE.MeshStandardMaterial({ color: col, roughness: rough==null?0.85:rough, metalness: 0.0 });
    const matSkin = M(0xe3b48f), matBody = M(0x7a5a34), matPants = M(0x4b3925),
          matHat = M(0xb8894a), matBoot = M(0x2e2013), matPack = M(0x8a5a2a);

    // body 는 상체 전체를 담는 그룹(호흡/bob 시 상체만 살짝 움직임)
    const bodyGrp = new THREE.Group(); grp.add(bodyGrp);
    const parts = { legs: [], arms: [], bodyGrp, grp };

    // Z-up 배치: position (x=좌우, y=전후[+정면], z=높이)
    // --- 다리(둘): 엉덩이 피벗(z≈0.58)에서 앞뒤 스윙. 다리+부츠를 pivot 자식으로. ---
    const legGeo = new THREE.CylinderGeometry(0.16, 0.16, 0.55, 8);
    const bootGeo = new THREE.CylinderGeometry(0.19,0.2,0.16,8);
    [-0.16, 0.16].forEach((x, i) => {
      const hip = new THREE.Group(); hip.position.set(x, 0, 0.58); grp.add(hip);
      const leg = new THREE.Mesh(legGeo, matPants); leg.rotation.x = Math.PI/2; leg.position.set(0, 0, -0.28); leg.castShadow=true; hip.add(leg);
      const boot = new THREE.Mesh(bootGeo, matBoot); boot.rotation.x = Math.PI/2; boot.position.set(0, 0.02, -0.50); hip.add(boot);
      parts.legs.push(hip);
    });
    // --- 몸통(둥근 배럴): 상체 그룹 ---
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.30, 0.62, 12), matBody);
    body.rotation.x = Math.PI/2; body.position.set(0, 0, 0.86); body.castShadow=true; bodyGrp.add(body);
    // --- 팔(둘): 어깨 피벗(z≈1.08)에서 앞뒤 스윙(다리 반대위상). 상체 그룹 자식. ---
    const armGeo = new THREE.CylinderGeometry(0.11, 0.11, 0.5, 8);
    [-0.4, 0.4].forEach((x, i) => {
      const sh = new THREE.Group(); sh.position.set(x, 0, 1.08); bodyGrp.add(sh);
      const arm = new THREE.Mesh(armGeo, matBody); arm.rotation.x = Math.PI/2; arm.position.set(0, 0, -0.22); sh.add(arm);
      const hand = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6), matSkin); hand.position.set(0, 0, -0.46); sh.add(hand);
      // 살짝 벌린 기본 자세 유지(x축 스윙엔 영향 없음)
      sh.rotation.y = x<0 ? 0.20 : -0.20;
      parts.arms.push(sh);
    });
    // --- 머리(구) ---
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 16, 12), matSkin);
    head.position.set(0, 0, 1.34); head.castShadow=true; bodyGrp.add(head);
    // --- 탐험가 모자(챙 넓은) — 넓은 브림 + 원뿔 크라운 ---
    const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.44, 0.44, 0.05, 18), matHat);
    brim.rotation.x = Math.PI/2; brim.position.set(0, 0, 1.5); bodyGrp.add(brim);
    const crown = new THREE.Mesh(new THREE.ConeGeometry(0.26, 0.3, 16), matHat);
    crown.rotation.x = -Math.PI/2; crown.position.set(0, 0, 1.66); bodyGrp.add(crown);
    // --- 등짐(백팩) — 뒤(-Y) ---
    const pack = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.24, 0.44), matPack);
    pack.position.set(0, -0.32, 0.92); bodyGrp.add(pack);
    // --- 코(작은 원뿔, 정면 +Y 표시) ---
    const nose = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.12, 8), matSkin);
    nose.rotation.x = -Math.PI/2; nose.position.set(0, 0.27, 1.32); bodyGrp.add(nose);

    grp.userData.parts = parts;
    charState.parts = parts;
    return grp;
  }

  // 절차적 애니메이션 갱신 (시간기반). walkAmt(0↔1)로 idle↔walk 블렌드.
  //   walk: 다리 앞뒤 큰 스윙 + 팔 반대위상 스윙 + 몸 상하 bob(2× 주기) + 살짝 앞으로 기울임.
  //   idle: 은은한 호흡 bob(상체만 아주 약간) + 아주 미세한 발 무게중심 이동.
  //   ★ 3/4 뒤 시점(pitch 55)에서 잘 보이도록 스윙 진폭을 크게(다리 ≈0.95rad, 팔 ≈0.85rad)
  //     + 무릎 굽힘·전진 기울임을 추가해 "확실히 걷는" 실루엣을 만든다. 모든 값은 walkAmt로 스케일.
  //   ★ QA: 실제 스윙 각도(charState.legSwing)를 노출해 '값이 실제로 반영되는지' 헤드리스 단언.
  function animateExplorer(nowMs) {
    const p = charState.parts;
    if (!p) return;
    // walk 목표: 마지막 이동이 최근이면 1, 아니면 0. walkAmt를 목표로 감쇠 보간(부드러운 전환).
    const target = (nowMs - charState.lastMoveAt) < WALK_HOLD_MS ? 1 : 0;
    charState.walkAmt += (target - charState.walkAmt) * 0.15;
    if (charState.walkAmt < 0.02) charState.walkAmt = 0;
    if (charState.walkAmt > 0.985) charState.walkAmt = 1;
    charState.anim = charState.walkAmt >= 0.5 ? "walk" : "idle";

    const w = charState.walkAmt;
    const t = nowMs * 0.001;
    // 걷기 사이클(스텝 주파수 ≈ 2.4Hz 느낌)
    const cyc = t * 8.4;
    const sc = Math.sin(cyc);
    // ★ 다리/팔 스윙 진폭 크게(3/4 뒤 시점에서 눈에 띄게). 다리 0.95rad(≈54°), 팔 0.85rad.
    const legSwing = sc * 0.95 * w;
    const armSwing = sc * 0.85 * w;
    charState.legSwing = legSwing;   // QA: 실제 반영 각도
    // 다리: 좌/우 반대위상 + 뒤로 뻗을 때 무릎 살짝(bootPivot 없으니 hip 스윙으로 대체)
    if (p.legs[0]) p.legs[0].rotation.x =  legSwing;
    if (p.legs[1]) p.legs[1].rotation.x = -legSwing;
    // 팔: 다리 반대위상(대각선 걸음) — 크게 흔들어 활기
    if (p.arms[0]) p.arms[0].rotation.x = -armSwing;
    if (p.arms[1]) p.arms[1].rotation.x =  armSwing;
    // 몸 bob: 걷기는 스텝 2배 주기로 뚜렷하게 상하, idle은 은은한 호흡
    const walkBob = Math.abs(sc) * 0.14 * w;              // 진폭↑(0.06→0.14) 뚜렷한 bob
    const idleBob = Math.sin(t * 1.7) * 0.022 * (1 - w);
    p.bodyGrp.position.z = walkBob + idleBob;
    // 걷기 시: 상체 좌우 롤(생동감) + 전진 기울임(정면 +Y로 살짝 기울여 "나아가는" 느낌)
    p.bodyGrp.rotation.y = sc * 0.09 * w;                 // 좌우 롤(0.05→0.09)
    p.bodyGrp.rotation.x = 0.13 * w;                      // 전진 기울임(pitch, +Y 방향)
    // 캐릭터 전체 살짝 상하(발 붙은 채 통짜 bob은 안 넣음 — bodyGrp만; grp는 정합 매트릭스 담당)
  }

  // 발굴현장(고고학) 프롭 링 — 탐험가 주변(반경 4~13m)에 발굴/유적 프롭을 드문드문.
  //  사용자 요청: "나무보다 고고학에 어울리는 배경". 나무·풀 스캐터를 제거하고
  //  ①부서진 유적 기둥 ②바위/돌무더기 ③반쯤 묻힌 뼈(늑골/두개) ④깨진 토기 조각
  //  ⑤발굴 말뚝(측량 스테이크) ⑥작은 발굴 텐트 — 6종을 결정론적 스캐터.
  //  성능: 프롭 종류별 지오메트리/머티리얼 공유(재사용), 소수(≈15개)만. depthTest는 상위에서 끔.
  //  각 프롭 팩토리는 로컬 그룹(Z-up, base at z=0)을 만들어 반환 → 스캐터가 위치/스케일/회전만.
  function buildPropRing(THREE, parent) {
    // --- 공유 머티리얼 (Z-up, 밝은/어두운 면 2톤으로 로우폴리 볼륨감) ---
    const mat = (c, r) => new THREE.MeshStandardMaterial({ color: c, roughness: r==null?0.92:r, metalness: 0.0, flatShading: true });
    // 바위·풀·나무만 (사용자 2026-07-01). 전부 작게.
    const mStone = mat(PROP.stone), mStoneHi = mat(PROP.stoneHi), mStoneDk = mat(PROP.stoneDk);
    const mLeaf = mat(0x8bbf5a), mLeafDk = mat(0x6fa348), mTrunk = mat(0x8a6a44, 0.95),
          mGrass = mat(0x8fc25a), mGrassDk = mat(0x76ab4a);
    // --- 공유 지오메트리 (작은 로우폴리, 재사용) ---
    const gRock  = new THREE.DodecahedronGeometry(0.30, 0);          // 로우폴리 바위
    const gRockS = new THREE.IcosahedronGeometry(0.17, 0);           // 잔돌
    const gTrunk = new THREE.CylinderGeometry(0.055, 0.08, 0.42, 6); // 나무 줄기
    const gLeaf  = new THREE.ConeGeometry(0.26, 0.52, 7);            // 나무 잎(아래단)
    const gLeaf2 = new THREE.ConeGeometry(0.19, 0.38, 7);           // 나무 잎(윗단)
    const gBlade = new THREE.ConeGeometry(0.05, 0.28, 4);           // 풀잎
    const props = new THREE.Group();

    // 나무: 줄기 + 원뿔 잎 2단 (Z-up, 작게)
    function makeTree() {
      const g = new THREE.Group();
      const trunk = new THREE.Mesh(gTrunk, mTrunk); trunk.rotation.x = Math.PI/2; trunk.position.set(0,0,0.21); g.add(trunk);
      const l1 = new THREE.Mesh(gLeaf,  mLeaf);   l1.rotation.x = Math.PI/2; l1.position.set(0,0,0.62); g.add(l1);
      const l2 = new THREE.Mesh(gLeaf2, mLeafDk); l2.rotation.x = Math.PI/2; l2.position.set(0,0,0.92); g.add(l2);
      return g;
    }
    // 바위: 큰 돌 + 잔돌 2개 (작게)
    function makeRock() {
      const g = new THREE.Group();
      const r0 = new THREE.Mesh(gRock,  mStone);   r0.rotation.set(0.3,0.5,0.2); r0.position.set(0,0,0.22); g.add(r0);
      const r1 = new THREE.Mesh(gRockS, mStoneHi); r1.rotation.set(0.4,0.2,0);   r1.position.set(0.28,0.08,0.13); g.add(r1);
      const r2 = new THREE.Mesh(gRockS, mStoneDk); r2.scale.setScalar(0.8);      r2.position.set(-0.22,0.24,0.11); g.add(r2);
      return g;
    }
    // 풀 무더기: 얇은 원뿔 블레이드 몇 개 (작게)
    function makeGrass() {
      const g = new THREE.Group();
      const blades = [[0,0,0,mGrass],[0.09,0.05,0.5,mGrassDk],[-0.08,0.03,-0.4,mGrass],[0.03,-0.08,0.9,mGrassDk],[-0.05,-0.06,-0.9,mGrass]];
      for (const b of blades) {
        const m = new THREE.Mesh(gBlade, b[3]); m.rotation.x = Math.PI/2; m.rotation.y = b[2];
        m.position.set(b[0], b[1], 0.14); g.add(m);
      }
      return g;
    }

    // 결정론적 스캐터(시드 고정 — 프레임마다 안 흔들림). 각도/반경 균등 분포 + 겹침 회피.
    let seed = 20260701;
    const rnd = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
    // 프롭 배치표: 종류별 개수(총 ≈24). factory + 개수 + 크기범위.
    // 캐릭터(발~모자 ≈1.8units)보다 살짝 작게(2026-07-01): 나무 base 1.11→h≈1.35~1.65,
    // 바위 base 0.52→h≈0.9~1.2, 풀 base 0.28→h≈0.65~0.9. 종류별 base가 달라 배율도 다름.
    const plan = [
      { make: makeTree,  n: 6,  sMin: 1.2, sMax: 1.5, rMin: 4, rMax: 14 },
      { make: makeRock,  n: 6,  sMin: 1.7, sMax: 2.3, rMin: 3, rMax: 14 },
      { make: makeGrass, n: 12, sMin: 2.2, sMax: 3.1, rMin: 3, rMax: 14 }
    ];
    for (const it of plan) {
      for (let i = 0; i < it.n; i++) {
        const ang = rnd() * Math.PI * 2, rad = it.rMin + rnd() * (it.rMax - it.rMin);
        const g = it.make();
        g.position.set(Math.cos(ang) * rad, Math.sin(ang) * rad, 0);
        g.rotation.z = rnd() * Math.PI * 2;            // 랜덤 방위(자연스럽게)
        g.scale.setScalar(it.sMin + rnd() * (it.sMax - it.sMin));
        g.userData.kind = it.make.name;
        props.add(g);
      }
    }
    parent.add(props);
    charState.props = props;   // (foliage 대체) QA/의미 갱신 — 발굴 프롭 그룹
  }

  // ★ 애니메이션 rAF 틱커 — render 경로와 독립. 항상 돌며 포즈를 갱신하고 repaint를 요청한다.
  //   · walk/전환 중: 매 프레임 repaint(부드러운 60fps 걷기).
  //   · 완전 idle(walkAmt=0 안정): 은은한 호흡을 위해 ~12fps로만 repaint(모바일 배터리 절약).
  //   render 안에서 triggerRepaint를 부르던 기존 방식은 render 예외 1회로 루프가 죽는 위험이 있었다.
  let _animRAF = 0, _lastIdleRepaint = 0;
  function startAnimTicker() {
    if (_animRAF) return;   // 멱등
    const tick = () => {
      _animRAF = requestAnimationFrame(tick);
      const now = performance.now();
      // 포즈/walkAmt 갱신(항상). 렌더 실패와 무관하게 애니 상태는 흐른다.
      animateExplorer(now);
      if (!map) return;
      const moving = charState.walkAmt > 0.001;
      if (moving) {
        map.triggerRepaint();                 // 걷기/전환: 매 프레임
      } else if (now - _lastIdleRepaint > 80) {
        _lastIdleRepaint = now;               // 완전 idle: ~12fps 호흡만
        map.triggerRepaint();
      }
      charState.ticks = (charState.ticks || 0) + 1;
    };
    _animRAF = requestAnimationFrame(tick);
    window.__animTickerOn = true;
  }

  // 메트릭스 정합 CustomLayer. MapLibre가 프레임마다 matrix를 넘겨준다.
  function addPlayerLayer() {
    if (charState.layerAdded || !map || typeof THREE === "undefined") return;
    charState.layerAdded = true;
    window.__playerLayerAdded = true;

    const layer = {
      id: "explorer-3d",
      type: "custom",
      renderingMode: "3d",
      onAdd: function (m, gl) {
        try {
          const three = {};
          three.camera = new THREE.Camera();
          three.scene = new THREE.Scene();
          // 라이팅(어스톤): 반구광 + 방향광
          const hemi = new THREE.HemisphereLight(0xffffff, 0x8a7a5a, 0.9); three.scene.add(hemi);
          const dir = new THREE.DirectionalLight(0xfff2d6, 1.1); dir.position.set(0.5, 1, 0.3); three.scene.add(dir);
          three.explorer = buildExplorer(THREE);
          // 발밑 그림자 디스크 (지도 위 '서 있는' 느낌 보강)
          const shadow = new THREE.Mesh(
            new THREE.CircleGeometry(0.55, 24),
            new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.28, depthWrite: false }));
          shadow.position.set(0, 0, 0.02);   // 발밑(Z-up이라 지면 살짝 위)
          three.explorer.add(shadow);
          // 고고학 발굴현장 디오라마: 탐험가 주변에 로우폴리 발굴 프롭(유적기둥·돌무더기·뼈·토기·말뚝·텐트)을 배치.
          //  캐릭터와 같은 지역 그룹(three.explorer)의 자식이라 같은 projection에 정합되고
          //  플레이어를 따라 이동하는 앰비언트 발굴장 링을 이룬다(맵 지오메트리 쿼리 불필요 = 헤드리스 견고).
          buildPropRing(THREE, three.explorer);
          // 캐릭터는 지도 위에 '올라타' 보이도록 depth test 끄고 그린다(맵 지형에 하반신 가림 방지).
          three.explorer.traverse((o) => { if (o.material) { o.material.depthTest = false; o.material.depthWrite = false; o.renderOrder = 999; } });
          three.explorer.renderOrder = 999;
          three.scene.add(three.explorer);
          three.renderer = new THREE.WebGLRenderer({ canvas: m.getCanvas(), context: gl, antialias: true });
          three.renderer.autoClear = false;
          charState.three = three;
          // ★ 애니메이션 틱커(핵심 수정): render 안에서 triggerRepaint를 부르면
          //   render가 한 번이라도 예외로 죽으면 repaint 요청이 끊겨 캐릭터가 영구 정지한다
          //   (= 사용자가 본 "애니 작동 안 함"의 주원인). → repaint 요청을 render 밖의
          //   독립 rAF 루프로 분리한다. 이 루프는 매 프레임 animateExplorer로 walkAmt/포즈를
          //   갱신하고 map.triggerRepaint()로 다음 프레임을 확실히 요청 → render 실패와 무관하게
          //   애니 상태는 계속 흐른다. idle에서도 은은한 호흡을 위해 항상 도는(가벼운) 루프.
          startAnimTicker();
        } catch (e) {
          console.warn("[char] Three.js CustomLayer 초기화 실패 → 마커 폴백", e && e.message);
          charState.useMarker = true;
          addMarkerFallback();
        }
      },
      render: function (gl, matrix) {
        const three = charState.three;
        if (!three || charState.useMarker) return;
        try {
          // 캐릭터 위치 = Mercator 좌표. 모델 크기 = meterInMercatorCoordinateUnits 기반 스케일.
          const mc = maplibregl.MercatorCoordinate.fromLngLat([charState.lng, charState.lat], 0);
          const s = mc.meterInMercatorCoordinateUnits() * 14;  // 캐릭터 높이 ≈ 14m 상당(포켓몬고식 큼직한 존재감)
          const m = new THREE.Matrix4().fromArray(matrix);
          // 모델(Z-up)→mercator 월드: translate to merc → scale(X동, Y남반전, Z업) → yaw(heading).
          //  mercator Y는 남쪽이 + 이므로 Y에 -s(반전)로 모델 +Y(정면)를 지도 북쪽에 맞춘다.
          //  Z-up 모델이라 rotateX 불필요 → 땅에 파묻힘/뒤집힘 정합오류 없음.
          const l = new THREE.Matrix4()
            .makeTranslation(mc.x, mc.y, mc.z || 0)
            .multiply(new THREE.Matrix4().makeScale(s, -s, s));
          // 이동방향 회전(헤딩): Z축(업) 기준 yaw
          const yaw = new THREE.Matrix4().makeRotationZ(charState.headingRad);
          three.camera.projectionMatrix = m.multiply(l).multiply(yaw);
          // 포즈 갱신은 rAF 틱커가 담당(render 실패와 분리). 여기선 방어적으로 한 번 더 반영만.
          animateExplorer(performance.now());
          three.renderer.resetState();
          // 캐릭터를 맵 위에 얹기: depth 버퍼 클리어 후 depth test 없이 렌더(하반신 가림 방지)
          try { gl.clear(gl.DEPTH_BUFFER_BIT); } catch (e) {}
          three.renderer.render(three.scene, three.camera);
          window.__charRendered = true;
          charState.frames = (charState.frames || 0) + 1;
        } catch (e) {
          if (!charState.useMarker) {
            console.warn("[char] 렌더 실패 → 마커 폴백", e && e.message);
            charState.useMarker = true;
            addMarkerFallback();
          }
        }
      }
    };
    try { map.addLayer(layer); }
    catch (e) {
      console.warn("[char] addLayer 실패 → 마커 폴백", e && e.message);
      charState.useMarker = true; addMarkerFallback();
    }
  }

  // 차선책: DOM/캔버스 스프라이트 캐릭터 마커 (기운 지도 위 upright)
  function addMarkerFallback() {
    if (charState.markerObj || !map || !window.maplibregl) return;
    const el = document.createElement("div");
    el.className = "player-sprite";
    el.style.cssText = "width:46px;height:64px;";
    el.innerHTML = playerSpriteSVG();
    charState.markerEl = el;
    charState.markerObj = new maplibregl.Marker({ element: el, anchor: "bottom", rotationAlignment: "viewport" })
      .setLngLat([charState.lng, charState.lat]).addTo(map);
    window.__charMarkerFallback = true;
  }
  // 로우폴리 탐험가 SVG (어스톤) — 마커 폴백용 (upright 인식 가능)
  function playerSpriteSVG() {
    return '<svg viewBox="0 0 46 64" width="46" height="64" xmlns="http://www.w3.org/2000/svg">'
      + '<ellipse cx="23" cy="60" rx="14" ry="3.5" fill="rgba(0,0,0,.32)"/>'
      + '<rect x="17" y="40" width="5" height="16" rx="2.5" fill="#4b3925"/>'
      + '<rect x="24" y="40" width="5" height="16" rx="2.5" fill="#4b3925"/>'
      + '<rect x="16" y="53" width="7" height="6" rx="2" fill="#2e2013"/>'
      + '<rect x="23" y="53" width="7" height="6" rx="2" fill="#2e2013"/>'
      + '<rect x="14" y="24" width="18" height="20" rx="7" fill="#7a5a34"/>'
      + '<rect x="9" y="26" width="6" height="15" rx="3" fill="#7a5a34"/>'
      + '<rect x="31" y="26" width="6" height="15" rx="3" fill="#7a5a34"/>'
      + '<circle cx="23" cy="16" r="9" fill="#e3b48f"/>'
      + '<ellipse cx="23" cy="10" rx="15" ry="4" fill="#b8894a"/>'
      + '<path d="M15 10 Q23 -2 31 10 Z" fill="#b8894a"/>'
      + '</svg>';
  }

  // 플레이어 그래픽 갱신(3D 캐릭터 or 마커 폴백 공통)
  function updatePlayerGraphic(lat, lng) {
    charState.lng = lng; charState.lat = lat;
    charState.headingRad = -playerHeading * Math.PI/180;   // 지도 북기준 → 모델 yaw
    if (charState.useMarker && charState.markerObj) {
      charState.markerObj.setLngLat([lng, lat]);
    } else if (charState.markerObj) {
      charState.markerObj.setLngLat([lng, lat]);
    }
    if (map) map.triggerRepaint();
  }

  // ==========================================================================
  // 진짜 GPS
  // ==========================================================================
  function startRealGPS() {
    if (!navigator.geolocation) {
      toast("이 기기는 위치를 지원하지 않아요. mock 모드로 실행합니다.", 3000);
      startMock(); return;
    }
    navigator.geolocation.watchPosition(
      (pos) => onPositionUpdate(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy),
      (err) => {
        console.warn("[GPS] error", err && err.message);
        toast("GPS 사용 불가 — mock 모드로 전환합니다.", 3000);
        startMock();
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 12000 }
    );
  }

  // ==========================================================================
  // MOCK GPS (개발용) — 시작좌표 + 방향버튼/자동드리프트
  // ==========================================================================
  const MOCK_START = {   // 기본 시작: 서울(korea 테스트). ?lat=&lng= 로 덮어쓰기 가능.
    lat: parseFloat(QP.get("lat")) || 37.5665,
    lng: parseFloat(QP.get("lng")) || 126.9780
  };
  const MOCK_STEP_M = 18;    // 방향버튼 1탭 이동 거리
  let mockAutoDrift = false;
  let mockDriftAng = rand(0, Math.PI*2);

  function startMock() {
    if (mockWatchTimer) return;
    document.getElementById("mock-badge").classList.add("show");
    document.getElementById("mock-pad").classList.add("show");
    onPositionUpdate(MOCK_START.lat, MOCK_START.lng, 5);
    // 자동 드리프트 루프 (토글 off면 정지)
    mockWatchTimer = setInterval(() => {
      if (!mockAutoDrift || player.lat == null) return;
      mockDriftAng += rand(-0.4, 0.4);
      const [nl, ng] = offsetMeters(player.lat, player.lng, Math.cos(mockDriftAng)*8, Math.sin(mockDriftAng)*8);
      onPositionUpdate(nl, ng, 5);
    }, 1000);
  }
  function mockMove(dir) {
    if (player.lat == null) return;
    let dN=0, dE=0;
    if (dir==="n") dN=MOCK_STEP_M; else if (dir==="s") dN=-MOCK_STEP_M;
    else if (dir==="e") dE=MOCK_STEP_M; else if (dir==="w") dE=-MOCK_STEP_M;
    else if (dir==="c") { mockAutoDrift = !mockAutoDrift; toast(mockAutoDrift?"자동 걷기 ON":"자동 걷기 OFF", 1400); return; }
    const [nl, ng] = offsetMeters(player.lat, player.lng, dN, dE);
    onPositionUpdate(nl, ng, 5);
  }
  document.querySelectorAll("#mock-pad button").forEach(b => {
    b.addEventListener("click", () => mockMove(b.dataset.dir));
  });

  // ==========================================================================
  // 도감 화면
  // ==========================================================================
  // 지역별 전체 loot 목록(도감 미수집 실루엣용) — 모든 지역 loot 평탄화(중복 이름 dedupe)
  function allKnownItems() {
    const rs = (REGIONS && REGIONS.regions) || REGIONS_FALLBACK.regions;
    const seen = new Map();
    for (const rk in rs) {
      if (rk === "default") continue;   // default는 판정 실패용, 도감 카탈로그에서 제외
      for (const l of (rs[rk].loot||[])) {
        const key = rk + "|" + l.name;
        if (!seen.has(key)) seen.set(key, Object.assign({ region: rk }, l));
      }
    }
    return seen;
  }
  function renderCollection() {
    const c = loadCollection();
    const catalog = allKnownItems();
    const grid = document.getElementById("col-grid");
    grid.innerHTML = "";
    const totalOwned = Object.keys(c).length;
    const totalCatalog = catalog.size;
    document.getElementById("col-count").textContent = totalOwned + " / " + totalCatalog;

    // 카탈로그 순회 (수집=밝게, 미수집=실루엣). 추가로 카탈로그 밖(default 등) 수집분도 뒤에 붙임.
    const cards = [];
    catalog.forEach((item, key) => {
      const owned = c[key];
      cards.push(cardHTML(item, owned));
    });
    // 카탈로그에 없는데 수집된 것 (default 지역 등)
    for (const k in c) {
      if (!catalog.has(k)) cards.push(cardHTML(c[k], c[k]));
    }
    if (cards.length === 0) {
      grid.innerHTML = '<div class="col-empty">아직 발굴한 화석이 없어요.<br>지도를 돌아다니며 발굴해 보세요!</div>';
      return;
    }
    grid.innerHTML = cards.join("");
  }
  function cardHTML(item, owned) {
    const rs = (REGIONS && REGIONS.regions) || REGIONS_FALLBACK.regions;
    const regLabel = (rs[item.region] && rs[item.region].label) || "미지";
    const icon = OBJ_ICON[item.obj] || "🦴";
    const rc = rarityColor(item.rarity);
    if (owned) {
      return '<div class="col-card"><div class="cc-qty">×'+owned.qty+'</div>'
        + '<div class="cc-icon">'+icon+'</div>'
        + '<div class="cc-name">'+item.name+'</div>'
        + '<div class="cc-region">'+regLabel+'</div>'
        + '<span class="cc-rarity" style="background:'+rc+';color:#1a130c;">'+(RARITY_KR[item.rarity]||"")+'</span>'
        + '</div>';
    }
    return '<div class="col-card locked">'
      + '<div class="cc-icon">'+icon+'</div>'
      + '<div class="cc-name">？？？</div>'
      + '<div class="cc-region">'+regLabel+'</div>'
      + '<span class="cc-rarity" style="background:#555;color:#ccc;">🔒 미발굴</span>'
      + '</div>';
  }
  document.getElementById("btn-collection").addEventListener("click", () => {
    renderCollection();
    document.getElementById("collection").classList.add("show");
  });
  document.getElementById("col-back").addEventListener("click", () => {
    document.getElementById("collection").classList.remove("show");
  });
  document.getElementById("btn-locate").addEventListener("click", () => {
    if (player.lat != null) { centerCameraOnPlayer(false); }
  });

  // ==========================================================================
  // 부팅
  // ==========================================================================
  async function loadRegions() {
    try {
      const res = await fetch(REGIONS_URL, { cache:"no-cache" });
      if (res.ok) { REGIONS = await res.json(); return; }
    } catch (e) { console.warn("[regions] fetch 실패, 인라인 폴백 사용"); }
    REGIONS = REGIONS_FALLBACK;
  }

  async function boot() {
    await initMap();          // liberty 소스 fetch(타임아웃 6s) 후 미니멀 스타일로 맵 생성
    await loadRegions();
    drainPending();   // 이전 세션/단독실행이 남긴 완료 이벤트 흡수(있다면)
    if (MOCK) startMock(); else startRealGPS();
    window.__ready = true;
  }

  // ==========================================================================
  // QA 훅 (헤드리스 검증) — 로직 위주
  // ==========================================================================
  window.__qa = {
    ready: () => !!window.__ready,
    isMock: () => MOCK,
    // 지도 상태 검증
    mapExists: () => !!map,
    mapLoaded: () => !!window.__mapLoaded,
    mapPitch: () => map ? map.getPitch() : null,
    mapBearing: () => map ? map.getBearing() : null,
    mapZoom: () => map ? map.getZoom() : null,
    mapCenter: () => map ? (function(){ const c=map.getCenter(); return { lng:c.lng, lat:c.lat }; })() : null,
    // 건물(fill-extrusion) 레이어 수 — 자연 디오라마는 0 이어야 함(건물 제거됨)
    buildingLayerCount: () => {
      if (!map || !map.getStyle) return -1;
      try { return (map.getStyle().layers||[]).filter(l => l.type === "fill-extrusion").length; } catch(e){ return -1; }
    },
    hasBuildings: () => {
      if (!map || !map.getStyle) return false;
      try { return (map.getStyle().layers||[]).some(l => l.type === "fill-extrusion"); } catch(e){ return false; }
    },
    // === 자연 디오라마 스타일 검증 훅 ===
    ofmSourceMode: () => window.__ofmSourceMode || null,   // "liberty-fetch" | "fallback*"
    styleLayers: () => { try { return (map.getStyle().layers||[]).map(l => ({ id:l.id, type:l.type, sl:l["source-layer"]||null })); } catch(e){ return []; } },
    styleLayerTypes: () => { try {
        const t={}; for (const l of (map.getStyle().layers||[])) t[l.type]=(t[l.type]||0)+1; return t;
      } catch(e){ return {}; } },
    // 라벨/POI/심볼 레이어 수 (미니멀=0 이어야 함)
    symbolLayerCount: () => { try { return (map.getStyle().layers||[]).filter(l => l.type==="symbol").length; } catch(e){ return -1; } },
    // 도로(transportation) 라인 레이어 수 (>0 이어야 "길만 그린" 룩) — 흙길 트레일
    roadLineCount: () => { try { return (map.getStyle().layers||[]).filter(l => l.type==="line" && l["source-layer"]==="transportation").length; } catch(e){ return -1; } },
    // 흙길 채움 색 (어스 탄/브라운인지 — 크림 화이트 도로 아님)
    trailPaint: () => { try {
        const ids = ["trail-major","trail-minor","trail-major-case","trail-minor-case"];
        const out = {};
        for (const id of ids) { try { out[id] = map.getPaintProperty(id, "line-color"); } catch(e){} }
        return out;
      } catch(e){ return null; } },
    // 배경(바닥)색
    backgroundColor: () => { try {
        const l = (map.getStyle().layers||[]).find(x => x.type==="background");
        return l ? map.getPaintProperty(l.id, "background-color") : null;
      } catch(e){ return null; } },
    palette: () => PAL,
    // 캐릭터 검증
    charLayerAdded: () => !!charState.layerAdded,
    charRendered: () => !!window.__charRendered,
    charMarkerFallback: () => !!window.__charMarkerFallback,
    charExists: () => !!(charState.layerAdded || charState.markerObj),
    charPos: () => ({ lng: charState.lng, lat: charState.lat }),
    // === 캐릭터 애니메이션 검증 ===
    charModel: () => charState.useMarker ? "marker" : (charState.parts ? "procedural" : null),
    charState: () => charState.anim,                 // "idle" | "walk"
    charWalkAmt: () => charState.walkAmt,            // 0(idle)↔1(walk)
    // 실제 다리 스윙 각도(rad) — 애니가 파트에 실제 반영되는지 단언용
    charLegSwing: () => (typeof charState.legSwing === "number" ? charState.legSwing : null),
    charLegRotX: () => (charState.parts && charState.parts.legs[0]) ? charState.parts.legs[0].rotation.x : null,
    charTicks: () => charState.ticks || 0,           // rAF 틱커 프레임 수(애니 루프 살아있음)
    animTickerOn: () => !!window.__animTickerOn,
    // 테스트용: 이동/정지 강제(GPS 없이 walk/idle 전환 단언). walkAmt 스냅 + 상태 확정(프레임 무관).
    markMoved: () => { charState.lastMoveAt = performance.now(); charState.walkAmt = 1; charState.anim = "walk"; return charState.anim; },
    clearMoved: () => { charState.lastMoveAt = 0; charState.walkAmt = 0; charState.anim = "idle"; return charState.anim; },
    // 발굴/고고학 프롭(나무 대체) 개수 + 종류. (구 foliageCount 별칭 유지)
    propCount: () => charState.props ? charState.props.children.length : 0,
    foliageCount: () => charState.props ? charState.props.children.length : 0,   // 하위호환 별칭(의미=프롭)
    propKinds: () => { try {
        const t = {}; if (charState.props) for (const c of charState.props.children) { const k = c.userData.kind||"?"; t[k]=(t[k]||0)+1; } return t;
      } catch(e){ return {}; } },
    // 프롭 높이 vs 캐릭터 높이(같은 부모 그룹 → 같은 스케일 공간, 비율 유효).
    //  charTop=모자 꼭대기 world z, tallestProp=가장 큰 프롭 꼭대기 z. ratio<1이면 캐릭터보다 작음.
    propSizeVsChar: () => { try {
        if (!charState.parts || !charState.props || typeof THREE === "undefined") return null;
        charState.parts.grp.updateWorldMatrix(true, true);
        const cbox = new THREE.Box3().setFromObject(charState.parts.bodyGrp);
        const charTop = cbox.max.z;
        let tallest = 0;
        for (const p of charState.props.children) {
          const b = new THREE.Box3().setFromObject(p);
          if (isFinite(b.max.z) && b.max.z > tallest) tallest = b.max.z;
        }
        return { charTop, tallestProp: tallest, ratio: charTop ? tallest / charTop : null };
      } catch(e){ return { err: String(e) }; } },
    // === 카메라 조작 검증 ===
    dragPanEnabled: () => { try { return !!(map && map.dragPan && map.dragPan.isEnabled()); } catch(e){ return null; } },
    dragRotateEnabled: () => { try { return !!(map && map.dragRotate && map.dragRotate.isEnabled()); } catch(e){ return null; } },
    dragRotated: () => !!window.__dragRotated,
    simDragRotate: (dx, dy) => (window.__simDragRotate ? window.__simDragRotate(dx, dy) : null),
    setZoom: (z) => { try { map.setZoom(z); return map.getZoom(); } catch(e){ return null; } },
    setBearing: (b) => { try { map.setBearing(b); return map.getBearing(); } catch(e){ return null; } },
    // mock 좌표 강제 세팅
    setPos: (lat, lng) => { onPositionUpdate(lat, lng, 5); return player; },
    playerPos: () => ({ lat: player.lat, lng: player.lng }),
    // 지역 강제 (테스트: 특정 지역 loot 검증용)
    forceRegion: (key) => { setRegion(key); if (player.lat!=null) spawnSpotsAround(player.lat, player.lng); return curRegionKey; },
    region: () => curRegionKey,
    regions: () => Object.keys((REGIONS&&REGIONS.regions)||{}),
    // 좌표 → 지역키 (bbox 폴백 경로만; 네트워크 없이 검증)
    regionByBBox: (lat, lng) => regionFromBBox(lat, lng),
    resolveRegion: (lat, lng) => resolveRegion(lat, lng),   // async
    spots: () => spots.map(s => ({ id:s.id, lat:s.lat, lng:s.lng, item:s.item,
      dist: player.lat!=null ? haversine(player.lat,player.lng,s.lat,s.lng) : null })),
    spotCount: () => spots.length,
    spotMarkersOnMap: () => spots.filter(s => !!s.marker).length,
    // 플레이어를 가장 가까운 spot 위로 순간이동 (in-range 강제)
    teleportToNearestSpot: () => {
      let best=null,bd=Infinity;
      for (const s of spots){ const d = player.lat!=null?haversine(player.lat,player.lng,s.lat,s.lng):0; if(d<bd){bd=d;best=s;} }
      if (best) { onPositionUpdate(best.lat, best.lng, 5); }
      return best ? { id:best.id, item:best.item } : null;
    },
    nearestInRange: () => nearestInRange ? { id:nearestInRange.id, item:nearestInRange.item } : null,
    discoverVisible: () => document.getElementById("discover-btn").classList.contains("show"),
    // 발견 버튼 클릭 (발굴게임 오버레이 오픈)
    clickDiscover: () => { document.getElementById("discover-btn").click(); return activeSpot ? activeSpot.id : null; },
    activeSpot: () => activeSpot ? { id:activeSpot.id, item:activeSpot.item } : null,
    digFrame: () => document.getElementById("dig-frame"),
    digOverlayOpen: () => document.getElementById("dig-overlay").classList.contains("show"),
    // 발굴게임 클리어를 셸에 직접 시뮬 (postMessage 경로 테스트)
    simulateComplete: (payload) => { handleDigComplete(Object.assign({type:"dig-complete"}, payload), false); },
    collection: () => loadCollection(),
    collectionSize: () => Object.keys(loadCollection()).length,
    clearCollection: () => { try{localStorage.removeItem(LS_COLLECTION);localStorage.removeItem(LS_PENDING);}catch(e){} },
    resultVisible: () => document.getElementById("result").classList.contains("show"),
    rollLoot: (region) => rollLoot(region),
    mockMove: (dir) => mockMove(dir)
  };
  // 지도 전용 QA 별칭(태스크 규약): __mapqa.charState() 등 지도/캐릭터 훅 노출
  window.__mapqa = window.__qa;

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();
</script>
</body>
</html>
